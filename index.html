<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ali & Aleyna Portföy</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome İkonları -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React, ReactDOM ve Recharts (Grafikler İçin) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      background-color: #f8fafc;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
    }
    .flower-anim {
      position: fixed;
      bottom: -100px;
      animation: floatUp ease-in forwards;
      z-index: 101;
      pointer-events: none;
    }

    @keyframes flutter {
      0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      50% { transform: translateY(30vh) translateX(100px) rotate(15deg); }
      90% { opacity: 1; }
      100% { transform: translateY(-20vh) translateX(-100px) rotate(-15deg); opacity: 0; }
    }
    .butterfly {
      position: fixed;
      bottom: -50px;
      animation: flutter ease-in-out forwards;
      z-index: 102;
      pointer-events: none;
    }

    @keyframes heartPulse {
      0%, 100% { transform: scale(1) rotate(12deg); }
      50% { transform: scale(1.1) rotate(12deg); }
    }
    .heart-pulse {
      animation: heartPulse 2.5s infinite ease-in-out;
    }

    .slide-fade {
      animation: slideFade 4s ease-in-out forwards;
    }
    @keyframes slideFade {
      0% { opacity: 0; transform: scale(0.85) translateY(30px); filter: blur(5px); }
      15% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      85% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      100% { opacity: 0; transform: scale(1.1) translateY(-20px); filter: blur(5px); }
    }

    @keyframes fadeOutScreen {
      0% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; pointer-events: none; }
    }
    .romantic-screen {
      animation: fadeOutScreen 17s forwards;
    }

    @keyframes float-gentle {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }
    .cute-bounce:active {
        transform: scale(0.92);
    }
    .cute-float {
        animation: float-gentle 3s ease-in-out infinite;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .toast-animate {
      animation: slideUp 0.3s ease-out forwards;
    }

    /* Strikethrough for completed items */
    .line-through-anim {
      text-decoration: line-through;
      color: #94a3b8;
      transition: all 0.3s ease;
    }
  </style>
</head>
<body class="text-slate-800 font-sans pb-24 md:pb-12">
  
  <div id="root"></div>

  <!-- FIREBASE BAĞLANTISI -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCXXP89y1yy9zBzvd7zeh7cWxCIrtegTpg",
      authDomain: "alialeynaportfoy.firebaseapp.com",
      projectId: "alialeynaportfoy",
      storageBucket: "alialeynaportfoy.firebasestorage.app",
      messagingSenderId: "173177562821",
      appId: "1:173177562821:web:54c7e1a705438b030732ac"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseApp = { 
        auth, db, signInWithPopup, provider, onAuthStateChanged, signOut,

    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <!-- REACT UYGULAMASI -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { ResponsiveContainer, AreaChart, Area, XAxis, YAxis, Tooltip, CartesianGrid } = window.Recharts || {};

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(() => onClose(), 4000);
        return () => clearTimeout(timer);
      }, [onClose]);

      const colors = type === 'error' ? 'bg-rose-600' : (type === 'warning' ? 'bg-amber-500' : 'bg-emerald-600');
      const icon = type === 'error' ? 'fa-circle-exclamation' : (type === 'warning' ? 'fa-triangle-exclamation' : 'fa-circle-check');

      return (
        <div className="fixed bottom-20 md:bottom-6 left-1/2 transform -translate-x-1/2 z-50 w-[90%] max-w-sm toast-animate">
          <div className={`${colors} text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3`}>
            <i className={`fa-solid ${icon} text-xl`}></i>
            <p className="font-semibold text-sm flex-1">{message}</p>
            <button onClick={onClose} className="text-white/70 hover:text-white"><i className="fa-solid fa-xmark"></i></button>
          </div>
        </div>
      );
    };

    const ReportModal = ({ isOpen, onClose, title, icon, content, isAleyna }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
          <div className="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden relative">
            {isAleyna && <span className="absolute top-4 right-14 text-2xl opacity-30 cute-float">🌸</span>}
            <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
              <h3 className={`text-xl font-bold ${isAleyna ? 'text-pink-600' : 'text-slate-800'} flex items-center gap-3`}>
                <div className={`w-10 h-10 rounded-xl ${isAleyna ? 'bg-pink-100 text-pink-500' : 'bg-indigo-100 text-indigo-600'} flex items-center justify-center`}>
                  <i className={`fa-solid ${icon}`}></i>
                </div>
                {title}
              </h3>
              <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-200 text-slate-600 hover:bg-slate-300 flex items-center justify-center transition">
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div className="p-6 text-slate-700 text-sm md:text-base leading-relaxed whitespace-pre-line max-h-[60vh] overflow-y-auto">
              {content}
            </div>
          </div>
        </div>
      );
    };

    const AleynaThemeEffects = () => {
        const particles = useMemo(() => {
            const arr = [];
            const icons = ['🌸', '🐾', '✨', '💖'];
            for(let i=0; i<15; i++) {
                arr.push({
                    id: i,
                    icon: icons[Math.floor(Math.random() * icons.length)],
                    left: `${Math.random() * 100}%`,
                    top: `${Math.random() * 100}%`,
                    animationDuration: `${5 + Math.random() * 5}s`,
                    animationDelay: `${Math.random() * 2}s`
                });
            }
            return arr;
        }, []);

        return (
            <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-30">
                {particles.map(p => (
                    <div key={p.id} className="absolute cute-float text-xl" style={{left: p.left, top: p.top, animationDuration: p.animationDuration, animationDelay: p.animationDelay}}>
                        {p.icon}
                    </div>
                ))}
            </div>
        );
    };

    const RomanticGreeting = ({ isOpen }) => {
      const [slideIndex, setSlideIndex] = useState(0);

      const effects = useMemo(() => {
        const items = [];
        const icons = ['🌸', '🌺', '🌷', '🦋', '🐱', '✨', '💖', '💐', '🐾'];
        for(let i = 0; i < 35; i++) {
          const isButterfly = Math.random() > 0.7;
          items.push({
            id: i,
            icon: icons[Math.floor(Math.random() * icons.length)],
            left: `${Math.random() * 100}%`,
            duration: `${5 + Math.random() * 5}s`,
            delay: `${Math.random() * 8}s`,
            size: `${1.2 + Math.random() * 2}rem`,
            isButterfly
          });
        }
        return items;
      }, []);

      useEffect(() => {
        if (!isOpen) return;
        const interval = setInterval(() => {
          setSlideIndex(prev => prev + 1);
        }, 4000); 
        return () => clearInterval(interval);
      }, [isOpen]);

      if (!isOpen) return null;

      const slides = [
        "Hoşgeldin gülüm 🌸",
        "Seni sevdiğimi söylemiş miydim ? ☀️",
        "Hayatımın anlamısın 🐱💖",
        "Seni her şeyinle seviyorum 💖🏡✨"
      ];

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-gradient-to-br from-pink-100 via-purple-50 to-rose-100 romantic-screen overflow-hidden px-4">
          {effects.map(e => (
            <div key={e.id} className={e.isButterfly ? "butterfly" : "flower-anim"} 
                 style={{ left: e.left, animationDuration: e.duration, animationDelay: e.delay, fontSize: e.size }}>
              {e.icon}
            </div>
          ))}
          <div className="relative z-[102] w-full max-w-lg flex flex-col items-center">
             {slides.map((text, idx) => (
                slideIndex === idx && (
                  <div key={idx} className="slide-fade flex flex-col items-center w-full absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                    <div className="w-20 h-20 md:w-28 md:h-28 bg-gradient-to-tr from-rose-400 to-pink-500 rounded-[1.5rem] md:rounded-[2.5rem] flex items-center justify-center shadow-2xl shadow-pink-500/40 mb-6 md:mb-8 heart-pulse relative">
                       <i className="fa-solid fa-heart text-4xl md:text-6xl text-white"></i>
                       <span className="absolute -top-3 -right-3 md:-top-4 md:-right-4 text-2xl md:text-3xl">🐱</span>
                    </div>
                    <div className="bg-white/50 backdrop-blur-xl px-5 py-8 md:px-8 md:py-10 rounded-[2rem] md:rounded-[3rem] border border-white/60 shadow-xl w-[95vw] md:w-full text-center">
                        <h1 className="text-2xl sm:text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-600 to-pink-600 drop-shadow-sm leading-tight px-2">
                          {text}
                        </h1>
                    </div>
                  </div>
                )
             ))}
          </div>
        </div>
      );
    };

    const App = () => {
      const [isFirebaseReady, setIsFirebaseReady] = useState(!!window.firebaseApp);
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      
      // Veri Koleksiyonları (ERP Tabloları)
      const [entries, setEntries] = useState([]);
      const [salaries, setSalaries] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [houses, setHouses] = useState([]); // Yeni: Kiralık Evler
      const [dowryItems, setDowryItems] = useState([]); // Yeni: Çeyiz
      const [mediaItems, setMediaItems] = useState([]); // Yeni: İzle/Oyna
      const [settings, setSettings] = useState({ engagementDate: '', marriageDate: '', targetAmount: '' });

      const [activeTab, setActiveTab] = useState('dashboard');
      const [toast, setToast] = useState(null);
      const [selectedReport, setSelectedReport] = useState(null);
      const [isSaving, setIsSaving] = useState(false);

      const [showRomanticGreeting, setShowRomanticGreeting] = useState(false);
      const [hasGreeted, setHasGreeted] = useState(false);

      const [marketData, setMarketData] = useState({ usd: null, eur: null, gold: null, interest: 50.0 });

      // Form States (Portföy)
      const [date, setDate] = useState(() => new Date().toISOString().split('T')[0]);
      const [mmfInvested, setMmfInvested] = useState('');
      const [mmfCurrent, setMmfCurrent] = useState('');
      const [goldInvested, setGoldInvested] = useState('');
      const [goldCurrent, setGoldCurrent] = useState('');
      const [fxInvested, setFxInvested] = useState('');
      const [fxCurrent, setFxCurrent] = useState('');
      const [passiveIncome, setPassiveIncome] = useState(''); 
      const [stocks, setStocks] = useState([]);

      // Form States (Bütçe & Tarihler)
      const [salaryAmount, setSalaryAmount] = useState('');
      const [expenseName, setExpenseName] = useState('');
      const [expenseAmount, setExpenseAmount] = useState('');
      const [engDateInput, setEngDateInput] = useState('');
      const [marDateInput, setMarDateInput] = useState('');
      const [targetAmountInput, setTargetAmountInput] = useState(''); 

      // Form States (Yeni Modüller)
      const [hTitle, setHTitle] = useState(''); const [hPrice, setHPrice] = useState(''); const [hLink, setHLink] = useState(''); const [hAddress, setHAddress] = useState(''); const [hRating, setHRating] = useState('3');
      const [dName, setDName] = useState(''); const [dPrice, setDPrice] = useState(''); const [dStatus, setDStatus] = useState('alinacak');
      const [mTitle, setMTitle] = useState(''); const [mType, setMType] = useState('film'); const [mStatus, setMStatus] = useState('bekliyor');

      const isAleyna = user?.email === 'aleynaerdn2294@gmail.com';
      const themeColor = isAleyna ? 'pink' : 'indigo';
      const themeHex = isAleyna ? '#ec4899' : '#6366f1';

      const showToast = (message, type = 'success') => setToast({ message, type });

      useEffect(() => {
        const handleReady = () => setIsFirebaseReady(true);
        window.addEventListener('firebase-ready', handleReady);
        return () => window.removeEventListener('firebase-ready', handleReady);
      }, []);

      useEffect(() => {
        const fetchRates = async () => {
          try {
            const resUsd = await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY');
            const dataUsd = await resUsd.json();
            const resEur = await fetch('https://api.frankfurter.app/latest?from=EUR&to=TRY');
            const dataEur = await resEur.json();

            let goldPrice = null;
            try {
              const goldRes = await fetch('https://api.codetabs.com/v1/proxy?quest=https://api.genelpara.com/embed/altin.json');
              if (goldRes.ok) {
                const goldData = await goldRes.json();
                goldPrice = parseFloat(String(goldData.GA.satis).replace(',', '.'));
              }
            } catch (goldError) { }

            setMarketData({ usd: dataUsd.rates.TRY, eur: dataEur.rates.TRY, gold: goldPrice, interest: 50.0 });
          } catch (error) {}
        };
        fetchRates();
      }, []);

      useEffect(() => {
        if (!isFirebaseReady) return;
        const { auth, onAuthStateChanged } = window.firebaseApp;
        
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          
          if (currentUser && currentUser.email === 'aleynaerdn2294@gmail.com' && !hasGreeted) {
            setShowRomanticGreeting(true);
            setHasGreeted(true);
            setTimeout(() => setShowRomanticGreeting(false), 17000); 
          }
          if(!currentUser) setLoading(false);
        });
        return () => unsubscribe();
      }, [isFirebaseReady, hasGreeted]);

      // Veritabanı Dinleme (Tüm ERP Tabloları)
      useEffect(() => {
        if (!isFirebaseReady || !user) return;
        const { db, collection, onSnapshot } = window.firebaseApp;
        
        const fallbackTimer = setTimeout(() => {
          if (loading) {
            setLoading(false);
            showToast("Bağlantı yavaş. Tarayıcınızda güvenlik kalkanı açık olabilir.", "warning");
          }
        }, 6000);

        const colRef = collection(db, 'portfoy_kayitlari_v2');
        const unsubscribe = onSnapshot(colRef, (snapshot) => {
          clearTimeout(fallbackTimer);
          const data = snapshot.docs.map(doc => doc.data());
          
          setEntries(data.filter(d => d.type === 'entry'));
          setSalaries(data.filter(d => d.type === 'salary').sort((a,b) => new Date(b.date) - new Date(a.date)));
          setExpenses(data.filter(d => d.type === 'expense').sort((a,b) => new Date(b.date) - new Date(a.date)));
          
          setHouses(data.filter(d => d.type === 'house').sort((a,b) => b.id - a.id));
          setDowryItems(data.filter(d => d.type === 'dowry').sort((a,b) => b.id - a.id));
          setMediaItems(data.filter(d => d.type === 'media').sort((a,b) => b.id - a.id));

          const s = data.find(d => d.id === 'settings');
          if(s) {
              setSettings(s);
              setEngDateInput(s.engagementDate || '');
              setMarDateInput(s.marriageDate || '');
              setTargetAmountInput(s.targetAmount || '');
          }
          
          setLoading(false);
        }, (error) => {
          clearTimeout(fallbackTimer);
          setLoading(false);
        });

        return () => {
          clearTimeout(fallbackTimer);
          unsubscribe();
        };
      }, [isFirebaseReady, user]);

      const handleLogin = async () => {
        try {
          const { auth, provider, signInWithPopup } = window.firebaseApp;
          await signInWithPopup(auth, provider);
        } catch (error) {
          if (error.code !== 'auth/popup-closed-by-user') showToast(`Giriş hatası: ${error.message}`, "error");
        }
      };

      const handleLogout = async () => {
        try {
          const { auth, signOut } = window.firebaseApp;
          await signOut(auth);
          setActiveTab('dashboard');
        } catch (error) { showToast("Çıkış yapılamadı.", "error"); }
      };

      // TİP DÖNÜŞÜMLERİ VE HESAPLAMALAR
      const sortedEntries = useMemo(() => [...entries].sort((a, b) => new Date(b.date) - new Date(a.date)), [entries]);
      const latestEntry = sortedEntries[0];
      const previousEntry = sortedEntries[1];

      const budgetStats = useMemo(() => {
          const latestSalary = salaries[0];
          if (!latestSalary) return null;

          const currentExpenses = expenses.filter(ex => new Date(ex.date) >= new Date(latestSalary.date));
          const totalExpenseAmount = currentExpenses.reduce((s, ex) => s + (ex.amount || 0), 0);
          const remainingSalary = latestSalary.amount - totalExpenseAmount;

          let baseInvested = 0;
          const entryBeforeSalary = sortedEntries.find(e => new Date(e.date) <= new Date(latestSalary.date));
          if(entryBeforeSalary) {
              baseInvested = (entryBeforeSalary.mmfInvested||0) + (entryBeforeSalary.goldInvested||0) + (entryBeforeSalary.fxInvested||0) + (entryBeforeSalary.stocks||[]).reduce((s,x)=>s+(x.invested||0),0);
          }
          
          const currentTotalInvested = latestEntry ? ((latestEntry.mmfInvested||0) + (latestEntry.goldInvested||0) + (latestEntry.fxInvested||0) + (latestEntry.stocks||[]).reduce((s,x)=>s+(x.invested||0),0)) : 0;
          
          let newlyInvested = currentTotalInvested - baseInvested;
          if(newlyInvested < 0) newlyInvested = 0;
          
          const investedPercent = (newlyInvested / latestSalary.amount) * 100;

          return { latestSalary, currentExpenses, totalExpenseAmount, remainingSalary, newlyInvested, investedPercent };
      }, [salaries, expenses, sortedEntries, latestEntry]);

      const specialDates = useMemo(() => {
          const today = new Date();
          today.setHours(0,0,0,0);
          
          let engDays = null;
          if(settings.engagementDate) {
              const engDate = new Date(settings.engagementDate);
              engDays = Math.floor((today - engDate) / (1000 * 60 * 60 * 24));
          }

          let marDays = null;
          let isMarriageFuture = false;
          if(settings.marriageDate) {
              const marDate = new Date(settings.marriageDate);
              const diff = marDate - today;
              marDays = Math.ceil(diff / (1000 * 60 * 60 * 24));
              isMarriageFuture = marDays > 0;
              if(!isMarriageFuture) marDays = Math.abs(marDays);
          }

          return { engDays, marDays, isMarriageFuture };
      }, [settings]);

      const chartData = useMemo(() => {
        return [...sortedEntries].reverse().map(e => {
            const tC = (e.mmfCurrent||0) + (e.goldCurrent||0) + (e.fxCurrent||0) + (e.stocks||[]).reduce((s, x) => s + (x.current||0), 0);
            const tI = (e.mmfInvested||0) + (e.goldInvested||0) + (e.fxInvested||0) + (e.stocks||[]).reduce((s, x) => s + (x.invested||0), 0);
            return {
                name: new Date(e.date).toLocaleDateString('tr-TR', { month: 'short', day: 'numeric' }),
                Varlik: tC,
                Yatirilan: tI
            };
        });
      }, [sortedEntries]);

      const handleExportCSV = () => {
        if(sortedEntries.length === 0) return showToast("Dışa aktarılacak veri bulunamadı.", "warning");
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "Tarih,Dolar Kuru,PPF Yatirilan,PPF Guncel,Altin Yatirilan,Altin Guncel,Doviz Yatirilan,Doviz Guncel,Hisse Yatirilan,Hisse Guncel,Aylik Pasif Gelir,Toplam Varlik,Net Kar\n";
        
        sortedEntries.forEach(e => {
            const hInvested = (e.stocks||[]).reduce((s,x) => s + (x.invested||0), 0);
            const hCurrent = (e.stocks||[]).reduce((s,x) => s + (x.current||0), 0);
            const totalI = (e.mmfInvested||0) + (e.goldInvested||0) + (e.fxInvested||0) + hInvested;
            const totalC = (e.mmfCurrent||0) + (e.goldCurrent||0) + (e.fxCurrent||0) + hCurrent;
            const profit = totalC - totalI;
            
            const row = [
                e.date, e.usdRate || 0,
                e.mmfInvested||0, e.mmfCurrent||0,
                e.goldInvested||0, e.goldCurrent||0,
                e.fxInvested||0, e.fxCurrent||0,
                hInvested, hCurrent,
                e.passiveIncome||0,
                totalC, profit
            ].join(",");
            csvContent += row + "\n";
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Portfoy_Gecmisi_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast(isAleyna ? "Excel başarıyla indirildi tatlım! 📥" : "Veriler Excel(CSV) formatında indirildi.");
      };

      const getStats = () => {
        if (!latestEntry) return null;
        const totalInvested = (latestEntry.mmfInvested || 0) + (latestEntry.goldInvested || 0) + (latestEntry.fxInvested || 0) + (latestEntry.stocks || []).reduce((sum, s) => sum + (s.invested || 0), 0);
        const totalCurrent = (latestEntry.mmfCurrent || 0) + (latestEntry.goldCurrent || 0) + (latestEntry.fxCurrent || 0) + (latestEntry.stocks || []).reduce((sum, s) => sum + (s.current || 0), 0);
        const totalProfit = totalCurrent - totalInvested;
        const totalProfitPercent = totalInvested > 0 ? (totalProfit / totalInvested) * 100 : 0;
        const totalPassiveIncome = entries.reduce((sum, e) => sum + (e.passiveIncome || 0), 0);
        
        let weeklyChangeTry = 0;
        if (previousEntry) {
          const prevCurrent = (previousEntry.mmfCurrent || 0) + (previousEntry.goldCurrent || 0) + (previousEntry.fxCurrent || 0) + (previousEntry.stocks || []).reduce((sum, s) => sum + (s.current || 0), 0);
          weeklyChangeTry = totalCurrent - prevCurrent;
        }

        const mmfRatio = totalCurrent > 0 ? ((latestEntry.mmfCurrent || 0) / totalCurrent) * 100 : 0;
        const goldRatio = totalCurrent > 0 ? ((latestEntry.goldCurrent || 0) / totalCurrent) * 100 : 0;
        const fxRatio = totalCurrent > 0 ? ((latestEntry.fxCurrent || 0) / totalCurrent) * 100 : 0;
        const stockRatio = totalCurrent > 0 ? (((latestEntry.stocks || []).reduce((sum, s) => sum + (s.current || 0), 0)) / totalCurrent) * 100 : 0;
        return { totalInvested, totalCurrent, totalProfit, totalProfitPercent, weeklyChangeTry, mmfRatio, goldRatio, fxRatio, stockRatio, totalPassiveIncome };
      };
      const stats = getStats();

      const formatCurrency = (value, currency = 'TRY', decimals = 0) => {
        if(currency === 'USD') return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: decimals }).format(value || 0);
        return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: decimals }).format(value || 0);
      };

      const handleAddStock = () => setStocks([...stocks, { id: Date.now(), name: '', invested: '', current: '' }]);
      const handleRemoveStock = (id) => setStocks(stocks.filter(s => s.id !== id));
      const handleStockChange = (id, field, value) => setStocks(stocks.map(s => s.id === id ? { ...s, [field]: value } : s));

      const handleEditEntry = (entry) => {
        setDate(entry.date);
        setMmfInvested(entry.mmfInvested || ''); setMmfCurrent(entry.mmfCurrent || '');
        setGoldInvested(entry.goldInvested || ''); setGoldCurrent(entry.goldCurrent || '');
        setFxInvested(entry.fxInvested || ''); setFxCurrent(entry.fxCurrent || '');
        setPassiveIncome(entry.passiveIncome || '');
        setStocks(entry.stocks && entry.stocks.length > 0 ? entry.stocks : [{ id: Date.now(), name: '', invested: '', current: '' }]);
        
        setActiveTab('add');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        showToast(isAleyna ? "Kayıt düzenleme açıldı güzelim, değiştirip kaydedebilirsin 💖" : "Kayıt düzenleme moduna alındı. Güncelleyip kaydedebilirsiniz.", "success");
      };

      const handleSaveEntry = async (e) => {
        e.preventDefault();
        if (!user) return;
        setIsSaving(true);
        const { db, doc, setDoc } = window.firebaseApp;
        const docIdToSave = entries.find(ev => ev.date === date)?.id || Date.now().toString();

        const newEntry = {
          id: docIdToSave, type: 'entry', date,
          mmfInvested: Number(mmfInvested) || 0, mmfCurrent: Number(mmfCurrent) || 0,
          goldInvested: Number(goldInvested) || 0, goldCurrent: Number(goldCurrent) || 0,
          fxInvested: Number(fxInvested) || 0, fxCurrent: Number(fxCurrent) || 0,
          passiveIncome: Number(passiveIncome) || 0,
          stocks: stocks.map(s => ({ ...s, name: s.name || 'İsimsiz Hisse', invested: Number(s.invested) || 0, current: Number(s.current) || 0 }))
        };

        try {
          const savePromise = setDoc(doc(db, 'portfoy_kayitlari_v2', docIdToSave), newEntry);
          await Promise.race([savePromise, new Promise((_, r) => setTimeout(() => r(new Error("TIMEOUT")), 15000))]);
          setActiveTab('dashboard');
          showToast(isAleyna ? "Kayıt başarıyla eklendi güzelim! 💖" : "Haftalık değerlendirme başarıyla kaydedildi! 🚀");
          setMmfInvested(''); setMmfCurrent(''); setGoldInvested(''); setGoldCurrent('');
          setFxInvested(''); setFxCurrent(''); setPassiveIncome(''); setStocks([]);
        } catch (error) {
          showToast(error.message === "TIMEOUT" ? "Bağlantı Zaman Aşımı." : 'Kayıt Reddedildi: ' + error.message, "error");
        } finally { setIsSaving(false); }
      };

      // --- BÜTÇE & TARİH KAYIT FONKSİYONLARI ---
      const handleSaveSettings = async (e) => {
        e.preventDefault();
        if(!user) return;
        try {
            const { db, doc, setDoc } = window.firebaseApp;
            await setDoc(doc(db, 'portfoy_kayitlari_v2', 'settings'), { id: 'settings', type: 'settings', engagementDate: engDateInput, marriageDate: marDateInput, targetAmount: Number(targetAmountInput) || 0 });
            showToast(isAleyna ? "Ayarlarımız kaydedildi aşkım 💖" : "Sistem ayarları başarıyla güncellendi.");
        } catch (error) { showToast("Kaydedilemedi.", "error"); }
      };

      const handleSaveSalary = async (e) => {
        e.preventDefault();
        if(!user) return;
        try {
            const { db, doc, setDoc } = window.firebaseApp;
            const id = 'sal_' + Date.now();
            await setDoc(doc(db, 'portfoy_kayitlari_v2', id), { id, type: 'salary', amount: Number(salaryAmount), date: new Date().toISOString().split('T')[0] });
            setSalaryAmount('');
            showToast(isAleyna ? "Maaşımız bereketli olsun canım! 💰" : "Maaş girişi başarıyla eklendi.");
        } catch (error) { showToast("Kaydedilemedi.", "error"); }

      const handleSaveExpense = async (e) => {

      const handleDeleteDocument = async (id, successMsg) => {

      // --- YENİ MODÜL KAYIT İŞLEMLERİ (EV, ÇEYİZ, MEDYA) ---
      const handleSaveHouse = async (e) => {

      };

      const showReport = (type) => {
        if (!stats || sortedEntries.length < 2) return showToast("Detaylı analiz için en az 2 haftalık veri girmelisiniz.", "warning");

        let content = "", title = "", icon = "";
        const oldestEntry = sortedEntries[sortedEntries.length - 1];
        const monthsPassed = Math.max(1, (new Date(latestEntry.date) - new Date(oldestEntry.date)) / (1000 * 60 * 60 * 24 * 30));

        switch(type) {
            case 'growth':
                title = "Uzun Vadeli Büyüme Raporu"; icon = "fa-seedling";
                const avgMonthlyGrowth = stats.totalProfit / monthsPassed;
                content = `🎯 Toplamda yatırdığınız ana para: ${formatCurrency(stats.totalInvested)}\n💰 Güncel Ulaşılan Büyüklük: ${formatCurrency(stats.totalCurrent)}\n\n`;
                content += `📈 Sizin disiplinli tasarrufunuz ve yatırımlarınız sayesinde portföyünüz net olarak ${formatCurrency(stats.totalProfit)} (%${stats.totalProfitPercent.toFixed(1)}) reel kâr elde etti.\n\n`;
                content += `⏱️ Aylık Ortalama Kâr Hızınız: ${formatCurrency(avgMonthlyGrowth)} / Ay.\nBu ivmeyle devam ederseniz bileşik getiri gücüyle portföyünüz kartopu etkisi yaratacaktır.`;
                break;
            case 'allocation':
                title = "Stratejik Varlık Dağılımı"; icon = "fa-chart-pie";
                content = `Portföyünüzün piyasa risklerine karşı duruşu:\n\n`;
                content += `🛡️ Güvenli Liman (PPF & Mevduat): %${stats.mmfRatio.toFixed(1)}\n`;
                content += `🌟 Değer Koruma (Altın): %${stats.goldRatio.toFixed(1)}\n`;
                content += `💵 Kur Koruması (Döviz): %${stats.fxRatio.toFixed(1)}\n`;
                content += `🚀 Büyüme Odaklı (Hisseler): %${stats.stockRatio.toFixed(1)}\n\n`;
                if(stats.mmfRatio > 60) content += "Yorum: Oldukça defansif bir yapıdasınız. Faizlerin düşüş trendine girmesi durumunda diğer enstrümanlara geçiş fırsatlarını değerlendirebilirsiniz.";
                else if(stats.stockRatio > 50) content += "Yorum: Agresif bir büyüme stratejisi izliyorsunuz. Borsadaki dalgalanmalar portföyünüzü derinden etkileyebilir, acil nakit ihtiyaçları için likit bir miktar ayırdığınızdan emin olun.";
                else content += "Yorum: Tebrikler! Çeşitlendirilmiş ve oldukça dengeli bir portföy yönetiyorsunuz.";
                break;
            case 'inflation':
                title = "Enflasyon ve Kur Analizi"; icon = "fa-shield-halved";
                const currentUsdRate = marketData.usd || 34.0;
                const portfolioInUsd = stats.totalCurrent / currentUsdRate;
                const investedInUsd = stats.totalInvested / currentUsdRate;
                const netUsdProfit = portfolioInUsd - investedInUsd;
                content = `Mevcut Güncel Kur: ${currentUsdRate.toFixed(2)} ₺\n\n`;
                content += `🌍 Global Satın Alma Gücünüz: ${formatCurrency(portfolioInUsd, 'USD')}\n\n`;
                if(netUsdProfit > 0) {
                    content += `🏆 Harika haber! TL bazındaki kârınız kur artışından daha yüksek. Portföyünüz Dolar bazında da ${formatCurrency(netUsdProfit, 'USD')} değer kazandı. Enflasyona karşı gerçek bir zafer.`;
                } else {
                    content += `⚠️ TL olarak kârda olsanız da, mevcut kur değişimleri sebebiyle portföyünüz Dolar karşısında ${formatCurrency(Math.abs(netUsdProfit), 'USD')} geride görünüyor. Getiri potansiyeli daha yüksek yatırım araçlarını inceleyebilirsiniz.`;
                }
                break;
        }
        setSelectedReport({ title, icon, content });
      };

      if (!loading && !user) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1618044733300-9472054094ee?q=80&w=2071&auto=format&fit=crop')] bg-cover bg-center">
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
            {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
            <div className="relative z-10 w-full max-w-md p-8 m-4 bg-white/95 backdrop-blur-xl rounded-[2rem] shadow-2xl text-center border border-white/20">
              <div className="w-20 h-20 bg-gradient-to-tr from-indigo-600 to-emerald-400 rounded-3xl mx-auto flex items-center justify-center shadow-lg mb-6 transform rotate-12">
                <i className="fa-solid fa-chart-line text-4xl text-white -rotate-12"></i>
              </div>
              <h1 className="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">Portföy<span className="text-indigo-600">Pro</span></h1>
              <p className="text-slate-500 font-medium mb-10">Ali & Aleyna - Finansal Özgürlük Paneli</p>
              <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 px-6 rounded-2xl hover:bg-slate-50 hover:border-indigo-200 hover:text-indigo-600 transition-all shadow-sm active:scale-95">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" className="w-6 h-6" />
                Google ile Giriş Yap
              </button>
            </div>
          </div>
        );
      }

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div className="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <p className="text-slate-600 font-bold tracking-wide animate-pulse">Sistem Hazırlanıyor...</p>
          </div>
        );
      }

      const targetAmount = settings.targetAmount || 0;
      const targetProgress = targetAmount > 0 && stats ? Math.min((stats.totalCurrent / targetAmount) * 100, 100) : 0;
      const totalGoldEquivalent = stats && marketData.gold ? (stats.totalCurrent / marketData.gold).toFixed(2) : 0;

      // Çeyiz İstatistikleri
      const dowrySpent = dowryItems.filter(d => d.status === 'alindi').reduce((s, d) => s + (d.price || 0), 0);
      const dowryPending = dowryItems.filter(d => d.status === 'alinacak').reduce((s, d) => s + (d.price || 0), 0);

      return (
        <div className={`max-w-md md:max-w-5xl mx-auto min-h-screen relative z-10 ${isAleyna ? 'bg-pink-50/30' : ''}`}>
          
          {isAleyna && <AleynaThemeEffects />}

          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          <ReportModal isOpen={selectedReport !== null} onClose={() => setSelectedReport(null)} {...selectedReport} isAleyna={isAleyna} />

          {/* APP HEADER */}
          <header className={`bg-gradient-to-b ${isAleyna ? 'from-rose-900 to-pink-900' : 'from-slate-900 to-slate-800'} text-white pt-10 pb-6 px-6 md:rounded-b-3xl shadow-xl relative overflow-hidden transition-colors duration-1000`}>
            <div className={`absolute top-0 right-0 w-64 h-64 ${isAleyna ? 'bg-pink-400' : 'bg-indigo-500'} opacity-20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3`}></div>

                                </div>
                            </div>

                        <div>
                          <p className="text-white/60 text-xs font-bold uppercase mb-1">Net Kâr / Zarar</p>

                            <i className={`fa-solid ${stats.totalProfit >= 0 ? 'fa-arrow-trend-up text-emerald-300' : 'fa-arrow-trend-down text-rose-300'} text-sm`}></i>

                        </div>
                      </div>

                                {stats.goldRatio > 0 && <div style={{width: `${stats.goldRatio}%`}} className="bg-amber-400 h-full transition-all"></div>}
                                {stats.fxRatio > 0 && <div style={{width: `${stats.fxRatio}%`}} className="bg-blue-500 h-full transition-all"></div>}
                                {stats.stockRatio > 0 && <div style={{width: `${stats.stockRatio}%`}} className="bg-rose-500 h-full transition-all"></div>}

                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-emerald-500"></div><div><p className="text-[10px] font-bold text-slate-400 uppercase">Para Piy.</p><p className="text-sm font-bold text-slate-800">%{stats.mmfRatio.toFixed(1)}</p></div></div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-amber-400"></div><div><p className="text-[10px] font-bold text-slate-400 uppercase">Altın Fonu</p><p className="text-sm font-bold text-slate-800">%{stats.goldRatio.toFixed(1)}</p></div></div>

                                Toplam Pasif Gelir / Temettü {isAleyna && <span className="text-lg">💖</span>}
                            </p>
                            <h2 className={`text-4xl font-black ${isAleyna ? 'text-pink-700' : 'text-emerald-800'} tracking-tighter`}>
                                {formatCurrency(stats.totalPassiveIncome)}

                    </div>

                    <div>
                      <h3 className="text-lg font-extrabold text-slate-800 mb-4 px-1 flex items-center gap-2">

                          <div className={`w-12 h-12 ${isAleyna ? 'bg-pink-50 text-pink-500' : 'bg-emerald-50 text-emerald-600'} rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform`}><i className="fa-solid fa-seedling"></i></div>
                          <div><h4 className="font-extrabold text-slate-800 text-base">Uzun Vadeli Büyüme</h4><p className="text-xs text-slate-500 mt-1 font-medium leading-relaxed">Aylık ortalama büyüme hızınız ve kar topu etkisi analizi.</p></div>
                        </button>
                        <button onClick={() => showReport('allocation')} className={`bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-3 hover:shadow-md transition text-left group ${isAleyna ? 'hover:border-pink-200' : ''}`}>

                          <div><h4 className="font-extrabold text-slate-800 text-base">Varlık Dağılımı</h4><p className="text-xs text-slate-500 mt-1 font-medium leading-relaxed">Risk profiliniz ve mevcut dağılımınızın güvenilirlik analizi.</p></div>
                        </button>
                        <button onClick={() => showReport('inflation')} className={`bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-3 hover:shadow-md transition text-left group ${isAleyna ? 'hover:border-pink-200' : ''}`}>
                          <div className={`w-12 h-12 ${isAleyna ? 'bg-rose-50 text-rose-500' : 'bg-amber-50 text-amber-500'} rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform`}><i className="fa-solid fa-shield-halved"></i></div>
                          <div><h4 className="font-extrabold text-slate-800 text-base">Enflasyon & Kur Raporu</h4><p className="text-xs text-slate-500 mt-1 font-medium leading-relaxed">Portföyünüzün Dolar karşısındaki gerçek reel satın alma gücü.</p></div>
                        </button>
                      </div>
                    </div>
                  </>
                )}
              </div>
            )}

                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">₺</span>

                                </div>
                                <input type="url" placeholder="İlan Linki (Sahibinden, Hepsiemlak vb.)" value={hLink} onChange={(e) => setHLink(e.target.value)} className={`w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:border-${themeColor}-500`} />

                                    </select>
                                </div>
                            </div>
                            <button type="submit" className={`cute-bounce w-full text-white font-bold py-3 rounded-xl transition flex justify-center items-center gap-2 bg-${themeColor}-600 hover:bg-${themeColor}-700`}>
                                <i className="fa-solid fa-plus"></i> Listeye Ekle

                                    </button>
                                    <div>
                                        <div className="flex justify-between items-start mb-2">

                                    </div>
                                    <div className="flex justify-between items-end border-t border-slate-100 pt-4 mt-2">
                                        <span className={`text-xl font-black text-${themeColor}-600`}>{formatCurrency(h.price)}</span>

                                            <a href={h.link} target="_blank" className={`text-xs font-bold bg-${themeColor}-50 text-${themeColor}-700 px-3 py-2 rounded-lg hover:bg-${themeColor}-100 transition`}>
                                                İlana Git <i className="fa-solid fa-arrow-up-right-from-square ml-1"></i>
                                            </a>
                                        )}
                                    </div>

                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-dollar-sign text-blue-500"></i> Döviz Fonları / Eurobond</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <div className="relative">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">₺</span>
                                <input type="number" placeholder="Yatırılan (TL)" value={fxInvested} onChange={(e) => setFxInvested(e.target.value)} className="w-full pl-8 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-bold text-slate-700 text-sm" />
                            </div>
                            <div className="relative">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">₺</span>
                                <input type="number" placeholder="Güncel (TL)" value={fxCurrent} onChange={(e) => setFxCurrent(e.target.value)} className="w-full pl-8 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-bold text-slate-700 text-sm" />
                            </div>
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                            <i className="fa-solid fa-arrow-trend-up text-rose-500"></i> Hisse Senetleri
                          </h3>
                          <button type="button" onClick={handleAddStock} className="cute-bounce text-xs bg-rose-100 text-rose-700 px-3 py-2 rounded-xl font-bold transition"><i className="fa-solid fa-plus"></i> Yeni Ekle</button>
                        </div>
                        
                        {stocks.length === 0 && <p className="text-xs font-medium text-slate-400 italic">Şu an takip edilen hisse senedi yok.</p>}

                        <div className="space-y-3">
                          {stocks.map((stock) => (
                            <div key={stock.id} className="flex flex-col sm:flex-row gap-2 bg-white border border-slate-200 p-3 rounded-2xl relative">
                              <button type="button" onClick={() => handleRemoveStock(stock.id)} className="absolute -top-2 -right-2 w-6 h-6 bg-slate-800 text-white rounded-full flex items-center justify-center shadow-md">
                                <i className="fa-solid fa-xmark text-xs"></i>
                              </button>
                              <div className="flex-1">
                                <input type="text" placeholder="Hisse Kodu" value={stock.name} onChange={(e) => handleStockChange(stock.id, 'name', e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-rose-400" />
                              </div>
                              <div className="flex-1 flex gap-2">
                                  <input type="number" placeholder="Yatırılan" value={stock.invested} onChange={(e) => handleStockChange(stock.id, 'invested', e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-rose-400" />
                                  <input type="number" placeholder="Güncel" value={stock.current} onChange={(e) => handleStockChange(stock.id, 'current', e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-rose-400" />
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                  </div>

                  <button type="submit" disabled={isSaving} className={`w-full cute-bounce text-white font-bold py-5 rounded-2xl shadow-xl transition text-lg flex justify-center items-center gap-2 ${isSaving ? 'bg-slate-400 cursor-not-allowed' : (isAleyna ? 'bg-pink-500 hover:bg-pink-600 shadow-pink-500/30' : 'bg-slate-900 hover:bg-slate-800')}`}>
                    {isSaving ? <i className="fa-solid fa-spinner fa-spin text-xl"></i> : (isAleyna ? <span className="text-xl">🐾</span> : <i className="fa-solid fa-cloud-arrow-up"></i>)}
                    {isSaving ? 'Buluta Eşitleniyor...' : (isAleyna ? 'Kaydet Güzelim 💖' : 'Verileri Güvenli Şekilde Kaydet')}
                  </button>
                </form>
              </div>
            )}

            {/* --- HISTORY TAB --- */}
            {activeTab === 'history' && (
              <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-4 md:p-8 animate-fade-in`}>
                
                <div className="flex justify-between items-center mb-6 px-1">
                    <h2 className="text-2xl font-black text-slate-900 flex items-center gap-2">
                        <i className={`fa-solid fa-clock-rotate-left ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Geçmiş Dönemler
                    </h2>
                    
                    <button onClick={handleExportCSV} className={`cute-bounce px-4 py-2 rounded-xl font-bold text-xs md:text-sm flex items-center gap-2 transition ${isAleyna ? 'bg-pink-100 text-pink-700 hover:bg-pink-200' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                        <i className="fa-solid fa-file-excel"></i> <span className="hidden sm:inline">Excel Olarak İndir</span><span className="sm:hidden">İndir</span> {isAleyna && <span>🌸</span>}
                    </button>
                </div>

                <div className="space-y-4 relative z-10">
                  {sortedEntries.map((entry) => {
                    const totalI = (entry.mmfInvested||0) + (entry.goldInvested||0) + (entry.fxInvested||0) + (entry.stocks||[]).reduce((s, x) => s + (x.invested||0), 0);
                    const totalC = (entry.mmfCurrent||0) + (entry.goldCurrent||0) + (entry.fxCurrent||0) + (entry.stocks||[]).reduce((s, x) => s + (x.current||0), 0);
                    const profit = totalC - totalI;
                    
                    return (
                      <div key={entry.id} className={`bg-slate-50 border border-slate-200 p-4 rounded-3xl flex flex-col sm:flex-row justify-between sm:items-center gap-4 transition hover:border-${isAleyna ? 'pink-300' : 'indigo-300'}`}>
                        <div className="flex items-center gap-4">
                          <div className={`w-14 h-14 bg-white rounded-2xl flex flex-col items-center justify-center shadow-sm border border-slate-100 shrink-0 ${isAleyna ? 'text-pink-600' : 'text-indigo-600'}`}>
                            <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">{new Date(entry.date).toLocaleDateString('tr-TR', {month:'short'})}</span>
                            <span className="text-xl font-black leading-none mt-0.5">{new Date(entry.date).getDate()}</span>
                          </div>
                          <div>
                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-wider mb-1">Toplam Portföy</p>
                            <h4 className="font-black text-lg text-slate-800 leading-none">{formatCurrency(totalC)}</h4>
                          </div>
                        </div>
                        <div className="flex items-center justify-between sm:justify-end gap-3 border-t sm:border-t-0 pt-3 sm:pt-0 border-slate-200">
                          <div className="text-right">
                              <p className="text-[10px] font-bold uppercase text-slate-400 mb-0.5">Net Getiri</p>
                              <p className={`text-sm font-black flex items-center justify-end gap-1 ${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                {profit >= 0 ? '+' : ''}{formatCurrency(profit)}
                              </p>
                          </div>
                          
                          <div className="flex items-center gap-1 ml-2">
                              <button onClick={() => handleEditEntry(entry)} className={`cute-bounce w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-slate-200 shadow-sm transition ${isAleyna ? 'text-pink-500 hover:bg-pink-50' : 'text-indigo-500 hover:bg-indigo-50'}`}>
                                <i className="fa-solid fa-pen-to-square"></i>
                              </button>
                              
                              <button onClick={() => handleDeleteDocument(entry.id, 'Geçmiş kayıt silindi.')} className="cute-bounce w-10 h-10 flex items-center justify-center rounded-xl bg-white text-rose-500 border border-slate-200 shadow-sm hover:bg-rose-50 transition">
                                <i className="fa-solid fa-trash-can"></i>
                              </button>
                          </div>

                        </div>
                      </div>
                    );
                  })}
                  {sortedEntries.length === 0 && (
                      <p className="text-center text-slate-400 font-medium py-10">Henüz kaydedilmiş bir geçmiş bulunmuyor.</p>
                  )}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
