    body {

    .hide-scrollbar::-webkit-scrollbar { display: none; }

    /* Romantik ve Temel Animasyonlar */
    @keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; } }

    @keyframes flutter { 0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 50% { transform: translateY(30vh) translateX(100px) rotate(15deg); } 90% { opacity: 1; } 100% { transform: translateY(-20vh) translateX(-100px) rotate(-15deg); opacity: 0; } }

    @keyframes heartPulse { 0%, 100% { transform: scale(1) rotate(12deg); } 50% { transform: scale(1.1) rotate(12deg); } }
    .heart-pulse { animation: heartPulse 2.5s infinite ease-in-out; }
    
    .slide-fade { animation: slideFade 4s ease-in-out forwards; }
    @keyframes slideFade { 0% { opacity: 0; transform: scale(0.85) translateY(30px); filter: blur(5px); } 15% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } 85% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } 100% { opacity: 0; transform: scale(1.1) translateY(-20px); filter: blur(5px); } }

    .romantic-screen { animation: fadeOutScreen 17s forwards; }
    
    @keyframes float-gentle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .cute-bounce:active { transform: scale(0.92); }
    .cute-float { animation: float-gentle 3s ease-in-out infinite; }
    
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast-animate { animation: slideUp 0.3s ease-out forwards; }
    
    .line-through-anim { text-decoration: line-through; color: #94a3b8; transition: all 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* TATLI HAYVANLAR (PEEK) ANİMASYONLARI */

    .animal-bl { position: fixed; bottom: 0; left: 0; animation: peek-bl 15s infinite ease-in-out; font-size: 3rem; z-index: 100; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    
    @keyframes peek-br { 0%, 100% { transform: translate(100%, 100%) rotate(30deg); } 40%, 50% { transform: translate(-10px, -10px) rotate(-10deg); } 60%, 90% { transform: translate(100%, 100%) rotate(30deg); } }
    .animal-br { position: fixed; bottom: 0; right: 0; animation: peek-br 18s infinite ease-in-out; font-size: 3rem; z-index: 100; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    
    @keyframes peek-tl { 0%, 100% { transform: translate(-100%, -100%) rotate(135deg); } 60%, 70% { transform: translate(10px, 10px) rotate(180deg); } 80%, 90% { transform: translate(-100%, -100%) rotate(135deg); } }
    .animal-tl { position: fixed; top: 0; left: 0; animation: peek-tl 20s infinite ease-in-out; font-size: 2.5rem; z-index: 100; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

    @keyframes peek-tr { 0%, 100% { transform: translate(100%, -100%) rotate(-135deg); } 25%, 35% { transform: translate(-10px, 10px) rotate(-180deg); } 45%, 90% { transform: translate(100%, -100%) rotate(-135deg); } }
    .animal-tr { position: fixed; top: 0; right: 0; animation: peek-tr 22s infinite ease-in-out; font-size: 2.5rem; z-index: 100; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

    const formatCurrency = (value, currency = 'TRY', decimals = 0) => {
        if(currency === 'USD') return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: decimals }).format(value || 0);
        return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: decimals }).format(value || 0);
    };

    const parseCurrency = (val) => {
        if (val === undefined || val === null || val === '') return 0;
        return Number(String(val).replace(/\./g, '').replace(',', '.')) || 0;
    };

    // --- CURRENCY INPUT BİLEŞENİ ---
    const CurrencyInput = ({ value, onChange, placeholder, className, isAleyna, icon = "₺" }) => {
        const formatVal = (val) => {
            if (val === undefined || val === null || val === '') return '';
            const strVal = String(val);
            const parts = strVal.split(',');
            let integerPart = parts[0].replace(/\D/g, '');
            integerPart = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            let decimalPart = parts.length > 1 ? ',' + parts[1].replace(/\D/g, '').substring(0, 2) : '';
            return strVal.includes(',') && parts.length === 1 ? integerPart + ',' : integerPart + decimalPart;
        };

        const handleChange = (e) => {
            let val = e.target.value;
            val = val.replace(/[^0-9,]/g, '');
            const commaCount = (val.match(/,/g) || []).length;
            if (commaCount > 1) return;
            onChange(val);
        };

                                <div className="absolute top-0 bottom-0 left-[25%] w-px bg-white/50"></div>

                            </div>

                          <p className={`${isAleyna ? 'text-pink-100' : 'text-indigo-200'} text-sm font-bold tracking-widest uppercase mb-1 flex items-center gap-2`}>

                        </div>
                      </div>
                      
                      <button onClick={() => handleEditEntry(latestEntry)} className={`md:hidden mt-6 w-full cute-bounce py-3 rounded-xl bg-white/10 hover:bg-white/20 transition text-sm font-bold flex items-center justify-center gap-2 backdrop-blur-sm border border-white/20`}>

                            </p>
                            <h2 className={`text-4xl font-black ${isAleyna ? 'text-pink-700' : 'text-emerald-800'} tracking-tighter`}>
                                {formatCurrency(stats.totalPassiveIncome)}
                            </h2>
                            <p className={`mt-3 text-xs font-medium ${isAleyna ? 'text-pink-500' : 'text-emerald-600'}`}>* Yatırımlarınızın size çalışarak kazandırdığı toplam nakit tutardır.</p>

                    </div>

                    <div className={`bg-white rounded-[2rem] p-6 md:p-8 shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} relative min-h-[300px]`}>

                            <i className={`fa-solid fa-chart-area ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Portföy Büyüme Grafiği {isAleyna && <span className="cute-float text-sm">🦋</span>}
                        </h3>
                        {window.Recharts && chartData.length > 0 ? (

                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={chartData}>
                                        <defs>
                                            <linearGradient id="colorVarlik" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor={isAleyna ? '#ec4899' : '#6366f1'} stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor={isAleyna ? '#ec4899' : '#6366f1'} stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 11, fill: '#94a3b8'}} />
                                        <YAxis hide={true} domain={['dataMin - 1000', 'auto']} />

                                            contentStyle={{ borderRadius: '1rem', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)', fontWeight: 'bold' }}

                                            labelStyle={{ color: '#64748b', marginBottom: '0.25rem' }}

                                        <Area type="monotone" name="Toplam Varlık" dataKey="Varlik" stroke={isAleyna ? '#db2777' : '#4f46e5'} strokeWidth={4} fillOpacity={1} fill="url(#colorVarlik)" />

                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        ) : (
                            <EmptyChart icon="fa-chart-area" text="Grafik için en az bir haftalık kayıt gereklidir" isAleyna={isAleyna} />
                        )}
                    </div>
                  </>

              </div>

                      <div className="flex justify-between items-center mb-6">

                          </h2>

                                  <label className="text-xs font-bold text-slate-400 uppercase ml-2">Ali Maaş</label>
                                  <CurrencyInput value={aliSalary} onChange={setAliSalary} placeholder="Ali Maaş (TL)" isAleyna={isAleyna} />
                              </div>
                              <div className="space-y-2">
                                  <label className={`text-xs font-bold ${isAleyna ? 'text-pink-400' : 'text-slate-400'} uppercase ml-2`}>Aleyna Maaş {isAleyna && '💖'}</label>
                                  <CurrencyInput value={aleynaSalary} onChange={setAleynaSalary} placeholder="Aleyna Maaş (TL)" isAleyna={isAleyna} />
                              </div>
                              <div className="space-y-2">
                                  <label className="text-xs font-bold text-slate-400 uppercase ml-2">Devreden Bakiye (Geçen Aydan)</label>
                                  <CurrencyInput value={rolloverSalary} onChange={setRolloverSalary} placeholder="Geçen Aydan Artan (TL)" icon="🔄" isAleyna={isAleyna} />
                              </div>
                          </div>

                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-5 rounded-2xl border border-slate-200">
                              <h3 className="col-span-1 md:col-span-2 text-sm font-bold text-slate-800 border-b border-slate-200 pb-2">Yan Haklar (Bütçe Harici)</h3>
                              <div className="space-y-2">
                                  <label className="text-xs font-bold text-slate-400 uppercase ml-2">Ali Yemek & Yol</label>
                                  <div className="flex gap-2">
                                      <CurrencyInput value={aliFood} onChange={setAliFood} placeholder="Yemek" icon="🍔" isAleyna={isAleyna} />
                                      <CurrencyInput value={aliTransport} onChange={setAliTransport} placeholder="Yol" icon="🚌" isAleyna={isAleyna} />
                                  </div>
                              </div>
                              <div className="space-y-2">
                                  <label className={`text-xs font-bold ${isAleyna ? 'text-pink-400' : 'text-slate-400'} uppercase ml-2`}>Aleyna Yemek & Yol</label>
                                  <div className="flex gap-2">
                                      <CurrencyInput value={aleynaFood} onChange={setAleynaFood} placeholder="Yemek" icon="🍔" isAleyna={isAleyna} />
                                      <CurrencyInput value={aleynaTransport} onChange={setAleynaTransport} placeholder="Yol" icon="🚌" isAleyna={isAleyna} />
                                  </div>
                              </div>
                          </div>
                          
                          <div className={`mt-4 p-4 rounded-xl flex justify-between items-center bg-emerald-50 border border-emerald-100`}>
                              <span className="font-bold text-emerald-800 uppercase text-sm">Toplam Çekirdek Bütçe:</span>
                              <span className={`text-2xl font-black text-emerald-600`}>
                                  {formatCurrency(parseCurrency(aliSalary) + parseCurrency(aleynaSalary) + parseCurrency(rolloverSalary))}
                              </span>
                          </div>

                          <button type="submit" disabled={isSavingAction} className={`cute-bounce w-full text-white font-bold py-4 rounded-2xl shadow-xl transition flex justify-center items-center gap-2 shrink-0 ${isSavingAction ? 'bg-slate-400' : (isAleyna ? 'bg-pink-500 hover:bg-pink-600 shadow-pink-500/30' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-600/30')}`}>
                              {isSavingAction ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-check"></i>} Bütçeyi Kaydet
                          </button>
                      </form>
                      
                      {budgetStats?.latestSalary && (
                          <p className="text-center text-xs font-bold text-slate-400 mt-4">
                            Aktif Dönem Başlangıcı: {new Date(budgetStats.latestSalary.date).toLocaleDateString('tr-TR')}
                          </p>
                      )}
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                      {/* HARCAMALAR */}
                      <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-6 relative`}>
                          <h2 className="text-xl font-black text-slate-900 tracking-tight flex items-center gap-2 mb-4">
                              <i className={`fa-solid fa-cart-shopping ${isAleyna ? 'text-pink-500' : 'text-rose-500'}`}></i> Harcamalar
                          </h2>
                          <form onSubmit={handleSaveExpense} className="flex flex-col gap-3 mb-6 bg-slate-50 p-4 rounded-[1.5rem] border border-slate-200">
                              <div className="flex gap-2">
                                  <input type="text" required placeholder="Harcama Adı" value={expenseName} onChange={(e) => setExpenseName(e.target.value)} className={`flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-rose-500/10 focus:border-rose-500'}`} />
                                  <select value={expenseCat} onChange={(e) => setExpenseCat(e.target.value)} className={`w-1/3 px-2 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-xs transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-rose-500/10 focus:border-rose-500'}`}>
                                      {EXPENSE_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                  </select>
                              </div>
                              <div className="flex gap-2">
                                  <select value={expenseOwner} onChange={(e) => setExpenseOwner(e.target.value)} className={`w-1/3 px-2 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-xs transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-rose-500/10 focus:border-rose-500'}`}>
                                      <option value="Ortak">Ortak</option>
                                      <option value="Ali">Ali</option>
                                      <option value="Aleyna">Aleyna</option>
                                  </select>
                                  <CurrencyInput value={expenseAmount} onChange={setExpenseAmount} placeholder="Tutar" isAleyna={isAleyna} className={isAleyna ? 'focus:border-pink-500' : 'focus:border-rose-500'} />
                                  <button type="submit" disabled={isSavingAction} className={`cute-bounce text-white font-bold py-3 px-6 rounded-xl transition flex justify-center items-center shrink-0 ${isSavingAction ? 'bg-slate-400' : (isAleyna ? 'bg-pink-500 hover:bg-pink-600' : 'bg-slate-900 hover:bg-slate-800')}`}>
                                      Ekle
                                  </button>
                              </div>
                          </form>

                              {budgetStats?.currentExpenses.map(ex => (
                                  <div key={ex.id} className="flex justify-between items-center bg-white border border-slate-100 p-3 rounded-xl hover:bg-slate-50 transition">
                                      <div className="flex flex-col">
                                          <span className="font-bold text-slate-700">{ex.name}</span>
                                          <span className="text-[10px] text-slate-400">{ex.category} | {ex.owner} | {new Date(ex.date).toLocaleDateString('tr-TR')}</span>
                                      </div>
                                      <div className="flex items-center gap-4">
                                          <span className="font-black text-rose-500">-{formatCurrency(ex.amount)}</span>
                                          <button type="button" onClick={() => handleDeleteDocument(ex.id, 'Harcama silindi.')} className="text-slate-400 hover:text-rose-500 transition p-2"><i className="fa-solid fa-trash-can"></i></button>
                                      </div>
                                  </div>
                              ))}
                              {(!budgetStats || budgetStats.currentExpenses.length === 0) && <p className="text-center text-sm font-medium text-slate-400 italic py-4">Bu dönem kayıt yok.</p>}
                          </div>
                      </div>

                              <i className={`fa-solid fa-repeat ${isAleyna ? 'text-pink-500' : 'text-blue-500'}`}></i> Abonelik Yöneticisi
                          </h2>
                          <form onSubmit={handleSaveSubscription} className="flex flex-col gap-3 mb-6 bg-slate-50 p-4 rounded-[1.5rem] border border-slate-200">
                              <div className="flex gap-2">
                                  <input type="text" required placeholder="Netflix, Spotify, Aidat..." value={subName} onChange={(e) => setSubName(e.target.value)} className={`flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-blue-500/10 focus:border-blue-500'}`} />
                                  <div className="w-1/3">
                                      <CurrencyInput value={subPrice} onChange={setSubPrice} placeholder="Aylık" isAleyna={isAleyna} className={isAleyna ? 'focus:border-pink-500' : 'focus:border-blue-500'} />
                                  </div>
                              </div>
                              <button type="submit" disabled={isSavingAction} className={`cute-bounce w-full text-white font-bold py-3 rounded-xl transition flex justify-center items-center ${isSavingAction ? 'bg-slate-400' : (isAleyna ? 'bg-pink-500 hover:bg-pink-600' : 'bg-slate-900 hover:bg-slate-800')}`}>
                                  Abone Ol
                              </button>
                          </form>

                              <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-3 flex justify-between">
                                  <span>Aktif Abonelikler</span>
                                  <span className="text-blue-500">Aylık: {formatCurrency(subscriptions.reduce((s,x)=>s+x.price,0))}</span>
                              </h4>
                              {subscriptions.map(sub => (
                                  <div key={sub.id} className="flex justify-between items-center bg-white border border-slate-100 p-3 rounded-xl hover:bg-slate-50 transition">

                                      <div className="flex items-center gap-4">
                                          <span className="font-black text-slate-600">{formatCurrency(sub.price)}/Ay</span>
                                          <button type="button" onClick={() => handleDeleteDocument(sub.id, 'Abonelik iptal edildi.')} className="text-slate-400 hover:text-rose-500 transition p-2"><i className="fa-solid fa-trash-can"></i></button>
                                      </div>
                                  </div>
                              ))}
                              {subscriptions.length === 0 && <p className="text-center text-sm font-medium text-slate-400 italic py-4">Abonelik bulunmuyor.</p>}
                          </div>
                      </div>
                  </div>
              </div>
            )}

                            <h2 className={`text-2xl font-black ${isAleyna ? 'text-pink-600' : 'text-rose-600'}`}>
                                {formatCurrency([...activeLoans, ...activeCards].reduce((sum, d) => sum + d.totalAmount, 0))}
                            </h2>
                        </div>
                        <div className={`bg-gradient-to-br ${isAleyna ? 'from-purple-50 to-fuchsia-100 border-fuchsia-200' : 'from-slate-50 to-slate-100 border-slate-200'} rounded-3xl p-5 shadow-sm border relative overflow-hidden`}>
                            <i className="fa-solid fa-calendar-days absolute -right-2 -bottom-2 text-[80px] text-slate-500/10 transform -rotate-12"></i>
                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Aylık Ödeme Yükü</p>
                            <h2 className={`text-2xl font-black ${isAleyna ? 'text-fuchsia-600' : 'text-slate-700'}`}>
                                {formatCurrency(budgetStats?.totalDebtPayments || 0)}
                            </h2>
                        </div>
                    </div>

                    <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-6 md:p-8 relative`}>

                                <select value={dbtType} onChange={(e) => setDbtType(e.target.value)} className={`w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`}>
                                    <option value="loan">🏦 Kredi (Taksitli)</option>
                                    <option value="card">💳 Kredi Kartı / Diğer Borç</option>
                                </select>
                                <input type="text" required placeholder="Borç Adı (Örn: Ziraat Kredi, Kira Borcu)" value={dbtName} onChange={(e) => setDbtName(e.target.value)} className={`w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`} />
                                
                                <CurrencyInput value={dbtTotal} onChange={setDbtTotal} placeholder="Toplam Kalan Borç Tutarı" isAleyna={isAleyna} />
                                <CurrencyInput value={dbtMonthly} onChange={setDbtMonthly} placeholder="Aylık Ödenecek Tutar" isAleyna={isAleyna} />

                                {dbtType === 'loan' && (
                                    <>
                                        <div className="relative">
                                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">Ay</span>
                                            <input type="number" required placeholder="Toplam Vade (Ay)" value={dbtInstallments} onChange={(e) => setDbtInstallments(e.target.value)} className={`w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`} />
                                        </div>
                                        <div className="relative">
                                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">%</span>
                                            <input type="number" step="0.01" placeholder="Aylık Faiz Oranı (Opsiyonel)" value={dbtInterest} onChange={(e) => setDbtInterest(e.target.value)} className={`w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`} />
                                        </div>
                                    </>
                                )}
                            </div>
                            <button type="submit" disabled={isSavingAction} className={`cute-bounce w-full text-white font-bold py-3 rounded-xl transition flex justify-center items-center gap-2 ${isSavingAction ? 'bg-slate-400' : `bg-${themeColor}-600 hover:bg-${themeColor}-700`}`}>
                                <i className="fa-solid fa-plus"></i> Borcu Kaydet
                            </button>
                        </form>

                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-4 mt-8">Aktif Krediler</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {activeLoans.map(d => {
                                const progress = Math.min((d.paidInstallments / d.totalInstallments) * 100, 100);
                                return (
                                <div key={d.id} className="bg-white border border-slate-200 rounded-2xl p-5 hover:shadow-md transition relative flex flex-col justify-between">
                                    <button onClick={() => handleDeleteDocument(d.id, 'Kredi silindi.')} className="absolute top-4 right-4 text-slate-300 hover:text-rose-500 transition">
                                        <i className="fa-solid fa-trash-can"></i>
                                    </button>
                                    <div>
                                        <h4 className="font-bold text-slate-800 pr-6 mb-1"><i className="fa-solid fa-building-columns text-slate-400 mr-1"></i> {d.name}</h4>
                                        <p className="text-xs text-slate-500 font-medium mb-3">Aylık: <b>{formatCurrency(d.monthlyPayment)}</b> {d.interestRate > 0 && `| Faiz: %${d.interestRate}`}</p>
                                        
                                        <div className="w-full bg-slate-100 rounded-full h-2.5 mb-1 overflow-hidden">
                                            <div className={`bg-${themeColor}-500 h-2.5 rounded-full transition-all`} style={{ width: `${progress}%` }}></div>
                                        </div>
                                        <div className="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-4">
                                            <span>{d.paidInstallments} / {d.totalInstallments} Ay Ödendi</span>
                                            <span>Kalan: {formatCurrency(d.totalAmount)}</span>
                                        </div>
                                    </div>
                                    <button onClick={() => handlePayLoanInstallment(d)} className={`cute-bounce w-full bg-${themeColor}-50 text-${themeColor}-600 font-bold py-2 rounded-xl border border-${themeColor}-100 hover:bg-${themeColor}-100 transition text-sm`}>
                                        Taksiti Öde (Düş)
                                    </button>
                                </div>
                            )})}
                            {activeLoans.length === 0 && <p className="col-span-full text-sm text-slate-400 italic">Aktif kredi bulunmuyor.</p>}
                        </div>

                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-4 mt-8">Kredi Kartı & Diğer Borçlar</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {activeCards.map(d => (
                                <div key={d.id} className="bg-white border border-slate-200 rounded-2xl p-5 hover:shadow-md transition relative flex flex-col justify-between">
                                    <button onClick={() => handleDeleteDocument(d.id, 'Borç silindi.')} className="absolute top-4 right-4 text-slate-300 hover:text-rose-500 transition">
                                        <i className="fa-solid fa-trash-can"></i>
                                    </button>
                                    <div>
                                        <h4 className="font-bold text-slate-800 pr-6 mb-1"><i className="fa-regular fa-credit-card text-slate-400 mr-1"></i> {d.name}</h4>
                                        <p className="text-xs text-slate-500 font-medium mb-3">Aylık Planlanan Ödeme: <b>{formatCurrency(d.monthlyPayment)}</b></p>
                                        <p className="text-2xl font-black text-rose-500 mb-4">{formatCurrency(d.totalAmount)}</p>
                                    </div>
                                    <button onClick={() => handlePayCardDebt(d)} className={`cute-bounce w-full bg-${themeColor}-50 text-${themeColor}-600 font-bold py-2 rounded-xl border border-${themeColor}-100 hover:bg-${themeColor}-100 transition text-sm`}>
                                        Ödeme Gir (Borçtan Düş)
                                    </button>
                                </div>
                            ))}
                            {activeCards.length === 0 && <p className="col-span-full text-sm text-slate-400 italic">Kredi kartı borcu bulunmuyor.</p>}
                        </div>

                    </div>
                </div>
            )}

            {/* --- YENİ MODÜL: DİLEKLER (WISHLIST) --- */}
            {activeTab === 'wishlist' && (
                <div className="space-y-6 pb-6 animate-fade-in relative">
                    <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-6 md:p-8 relative`}>
                        <h2 className="text-2xl font-black text-slate-900 tracking-tight flex items-center gap-2 mb-6">
                            <i className={`fa-solid fa-star ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Dileklerimiz & Hedeflerimiz
                        </h2>
                        
                        <form onSubmit={handleSaveWishlist} className="space-y-4 mb-8 bg-slate-50 p-5 rounded-[1.5rem] border border-slate-200">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" required placeholder="Ne istiyoruz? (Örn: Paris Tatili, Dyson)" value={wName} onChange={(e) => setWName(e.target.value)} className={`w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`} />
                                <CurrencyInput value={wPrice} onChange={setWPrice} placeholder="Tahmini Fiyat (Opsiyonel)" isAleyna={isAleyna} />
                                <input type="url" placeholder="İnternet Linki (Opsiyonel)" value={wLink} onChange={(e) => setWLink(e.target.value)} className={`w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`} />
                                <div className="flex items-center gap-2 px-2 bg-white rounded-xl border border-slate-200">
                                    <label className="text-xs font-bold text-slate-500 ml-2">Öncelik:</label>
                                    <select value={wPriority} onChange={(e) => setWPriority(e.target.value)} className={`flex-1 px-2 py-3 outline-none font-bold text-slate-700 text-sm transition`}>
                                        <option value="3">🔥 Çok Acil / Çok İstiyoruz</option>
                                        <option value="2">⭐ Normal / Alınabilir</option>
                                        <option value="1">💭 Gelecek Hayali / Acelesi Yok</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" disabled={isSavingAction} className={`cute-bounce w-full text-white font-bold py-3 rounded-xl transition flex justify-center items-center gap-2 ${isSavingAction ? 'bg-slate-400' : `bg-${themeColor}-600 hover:bg-${themeColor}-700`}`}>
                                <i className="fa-solid fa-wand-magic-sparkles"></i> Dileği Evrene Gönder
                            </button>
                        </form>

                        <div className="space-y-4">
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-4 mt-8">Gerçekleşmeyi Bekleyen Hayaller ✨</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {wishlist.filter(w => w.status === 'bekliyor').map(w => (

                            <div className="flex-1 relative"><span className="absolute left-2 top-2 text-[10px] font-bold text-slate-400">PPF %</span><input type="number" value={pMmf} onChange={e=>setPMmf(e.target.value)} className="w-full pt-6 pb-2 px-2 rounded-lg border border-slate-200 text-center font-bold text-sm outline-none" /></div>
                            <div className="flex-1 relative"><span className="absolute left-2 top-2 text-[10px] font-bold text-slate-400">Altın %</span><input type="number" value={pGold} onChange={e=>setPGold(e.target.value)} className="w-full pt-6 pb-2 px-2 rounded-lg border border-slate-200 text-center font-bold text-sm outline-none" /></div>
                            <div className="flex-1 relative"><span className="absolute left-2 top-2 text-[10px] font-bold text-slate-400">Döviz %</span><input type="number" value={pFx} onChange={e=>setPFx(e.target.value)} className="w-full pt-6 pb-2 px-2 rounded-lg border border-slate-200 text-center font-bold text-sm outline-none" /></div>
                            <div className="flex-1 relative"><span className="absolute left-2 top-2 text-[10px] font-bold text-slate-400">Hisse %</span><input type="number" value={pStock} onChange={e=>setPStock(e.target.value)} className="w-full pt-6 pb-2 px-2 rounded-lg border border-slate-200 text-center font-bold text-sm outline-none" /></div>
                        </div>
                    </div>
                    <button type="button" onClick={handleAutoAllocate} className={`w-full cute-bounce font-bold py-3 rounded-xl transition text-sm ${isAleyna ? 'bg-pink-100 text-pink-700 hover:bg-pink-200' : 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200'}`}>
                        Yüzdelere Göre Aşağıya Dağıt
                    </button>
                </div>

                <form onSubmit={handleSaveEntry} className="space-y-8 relative z-10">
                  <div className="space-y-2">
                    <label className="block text-xs font-black text-slate-400 uppercase tracking-widest pl-1">Değerlendirme Tarihi</label>
                    <input type="date" required value={date} onChange={(e) => setDate(e.target.value)} className={`w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 outline-none transition font-bold text-slate-700 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`} />
                  </div>

                  <div className="space-y-4">
                      
                      <div className={`bg-gradient-to-r ${isAleyna ? 'from-pink-50 to-white border-pink-200' : 'from-emerald-50 to-white border-emerald-200'} border p-5 rounded-[1.5rem]`}>
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className={`fa-solid fa-hand-holding-dollar ${isAleyna ? 'text-pink-500' : 'text-emerald-600'}`}></i> Ekstra Gelirler / Acil Durum Fonu</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <CurrencyInput value={passiveIncome} onChange={setPassiveIncome} placeholder="Bu ayki Temettü / Faiz Getirisi" isAleyna={isAleyna} />
                            <CurrencyInput value={emergencyFund} onChange={setEmergencyFund} placeholder="Acil Durum Fonu (Nakit)" icon="🛡️" isAleyna={isAleyna} />
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-piggy-bank text-emerald-500"></i> Para Piyasası / Mevduat</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <CurrencyInput value={mmfInvested} onChange={setMmfInvested} placeholder="Yatırılan Maliyet" isAleyna={isAleyna} />
                            <CurrencyInput value={mmfCurrent} onChange={setMmfCurrent} placeholder="Güncel Değer" isAleyna={isAleyna} />
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-coins text-amber-400"></i> Altın Fonları / Fiziksel</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <CurrencyInput value={goldInvested} onChange={setGoldInvested} placeholder="Yatırılan Maliyet" isAleyna={isAleyna} />
                            <CurrencyInput value={goldCurrent} onChange={setGoldCurrent} placeholder="Güncel Değer" isAleyna={isAleyna} />
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-dollar-sign text-blue-500"></i> Döviz Fonları / Eurobond</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <CurrencyInput value={fxInvested} onChange={setFxInvested} placeholder="Yatırılan (TL)" isAleyna={isAleyna} />
                            <CurrencyInput value={fxCurrent} onChange={setFxCurrent} placeholder="Güncel (TL)" isAleyna={isAleyna} />
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                            <i className="fa-solid fa-arrow-trend-up text-rose-500"></i> Hisse Senetleri
                          </h3>
                          <button type="button" onClick={handleAddStock} className="cute-bounce text-xs bg-rose-100 text-rose-700 px-3 py-2 rounded-xl font-bold transition"><i className="fa-solid fa-plus"></i> Yeni Ekle</button>
                        </div>
                        
                        {stocks.length === 0 && <p className="text-xs font-medium text-slate-400 italic">Şu an takip edilen hisse senedi yok.</p>}

                        <div className="space-y-3">
                          {stocks.map((stock) => (
                            <div key={stock.id} className="flex flex-col sm:flex-row gap-2 bg-white border border-slate-200 p-3 rounded-2xl relative">
                              <button type="button" onClick={() => handleRemoveStock(stock.id)} className="absolute -top-2 -right-2 w-6 h-6 bg-slate-800 text-white rounded-full flex items-center justify-center shadow-md">
                                <i className="fa-solid fa-xmark text-xs"></i>
                              </button>
                              <div className="flex-1">
                                <input type="text" placeholder="Hisse Kodu" value={stock.name} onChange={(e) => handleStockChange(stock.id, 'name', e.target.value)} className={`w-full px-3 py-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold text-slate-700 outline-none focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-rose-500/10 focus:border-rose-500'}`} />
                              </div>
                              <div className="flex-1 flex gap-2">
                                  <CurrencyInput value={stock.invested} onChange={(val) => handleStockChange(stock.id, 'invested', val)} placeholder="Yatırılan" isAleyna={isAleyna} />
                                  <CurrencyInput value={stock.current} onChange={(val) => handleStockChange(stock.id, 'current', val)} placeholder="Güncel" isAleyna={isAleyna} />
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                  </div>

                  <button type="submit" disabled={isSavingAction} className={`w-full cute-bounce text-white font-bold py-5 rounded-2xl shadow-xl transition text-lg flex justify-center items-center gap-2 ${isSavingAction ? 'bg-slate-400 cursor-not-allowed' : (isAleyna ? 'bg-pink-500 hover:bg-pink-600 shadow-pink-500/30' : 'bg-slate-900 hover:bg-slate-800')}`}>
                    {isSavingAction ? <i className="fa-solid fa-spinner fa-spin text-xl"></i> : (isAleyna ? <span className="text-xl">🐾</span> : <i className="fa-solid fa-cloud-arrow-up"></i>)}
                    {isSavingAction ? 'Buluta Eşitleniyor...' : (isAleyna ? 'Kaydet Güzelim 💖' : 'Verileri Güvenli Şekilde Kaydet')}
                  </button>
                </form>
              </div>
            )}

            {/* --- HISTORY TAB --- */}
            {activeTab === 'history' && (
              <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-4 md:p-8 animate-fade-in`}>
                <div className="flex justify-between items-center mb-6 px-1">
                    <h2 className="text-2xl font-black text-slate-900 flex items-center gap-2">
                        <i className={`fa-solid fa-clock-rotate-left ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Geçmiş Dönemler
                    </h2>
                    <button onClick={handleExportCSV} className={`cute-bounce px-4 py-2 rounded-xl font-bold text-xs md:text-sm flex items-center gap-2 transition ${isAleyna ? 'bg-pink-100 text-pink-700 hover:bg-pink-200' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                        <i className="fa-solid fa-file-excel"></i> <span className="hidden sm:inline">Excel Olarak İndir</span><span className="sm:hidden">İndir</span> {isAleyna && <span>🌸</span>}
                    </button>
                </div>

                <div className="space-y-4 relative z-10">
                  {sortedEntries.map((entry) => {
                    const totalI = (entry.mmfInvested||0) + (entry.goldInvested||0) + (entry.fxInvested||0) + (entry.stocks||[]).reduce((s, x) => s + (x.invested||0), 0) + (entry.emergencyFund||0);
                    const totalC = (entry.mmfCurrent||0) + (entry.goldCurrent||0) + (entry.fxCurrent||0) + (entry.stocks||[]).reduce((s, x) => s + (x.current||0), 0) + (entry.emergencyFund||0);
                    const profit = totalC - totalI;
                    
                    return (
                      <div key={entry.id} className={`bg-slate-50 border border-slate-200 p-4 rounded-3xl flex flex-col sm:flex-row justify-between sm:items-center gap-4 transition hover:border-${isAleyna ? 'pink-300' : 'indigo-300'}`}>
                        <div className="flex items-center gap-4">
                          <div className={`w-14 h-14 bg-white rounded-2xl flex flex-col items-center justify-center shadow-sm border border-slate-100 shrink-0 ${isAleyna ? 'text-pink-600' : 'text-indigo-600'}`}>
                            <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">{new Date(entry.date).toLocaleDateString('tr-TR', {month:'short'})}</span>
                            <span className="text-xl font-black leading-none mt-0.5">{new Date(entry.date).getDate()}</span>
                          </div>
                          <div>
                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-wider mb-1">Toplam Portföy</p>
                            <h4 className="font-black text-lg text-slate-800 leading-none">{formatCurrency(totalC)}</h4>
                          </div>
                        </div>
                        <div className="flex items-center justify-between sm:justify-end gap-3 border-t sm:border-t-0 pt-3 sm:pt-0 border-slate-200">
                          <div className="text-right">
                              <p className="text-[10px] font-bold uppercase text-slate-400 mb-0.5">Net Getiri</p>
                              <p className={`text-sm font-black flex items-center justify-end gap-1 ${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                {profit >= 0 ? '+' : ''}{formatCurrency(profit)}
                              </p>
                          </div>
                          <div className="flex items-center gap-1 ml-2">
                              <button onClick={() => handleEditEntry(entry)} className={`cute-bounce w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-slate-200 shadow-sm transition ${isAleyna ? 'text-pink-500 hover:bg-pink-50' : 'text-indigo-500 hover:bg-indigo-50'}`}><i className="fa-solid fa-pen-to-square"></i></button>
                              <button onClick={() => handleDeleteDocument(entry.id, 'Geçmiş kayıt silindi.')} className="cute-bounce w-10 h-10 flex items-center justify-center rounded-xl bg-white text-rose-500 border border-slate-200 shadow-sm hover:bg-rose-50 transition"><i className="fa-solid fa-trash-can"></i></button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {sortedEntries.length === 0 && <p className="text-center text-slate-400 font-medium py-10">Henüz kaydedilmiş bir geçmiş bulunmuyor.</p>}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
