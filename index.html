  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      background-color: #f8fafc;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    /* Romantik Karşılama Animasyonları */
    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
    }
    .flower-anim {
      position: fixed;
      bottom: -100px;
      animation: floatUp ease-in forwards;
      z-index: 101;
      pointer-events: none;
    }

    @keyframes flutter {
      0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      50% { transform: translateY(30vh) translateX(100px) rotate(15deg); }
      90% { opacity: 1; }
      100% { transform: translateY(-20vh) translateX(-100px) rotate(-15deg); opacity: 0; }
    }
    .butterfly {
      position: fixed;
      bottom: -50px;
      animation: flutter ease-in-out forwards;
      z-index: 102;
      pointer-events: none;
    }

    @keyframes heartPulse {
      0%, 100% { transform: scale(1) rotate(12deg); }
      50% { transform: scale(1.1) rotate(12deg); }
    }
    .heart-pulse {
      animation: heartPulse 2.5s infinite ease-in-out;
    }

    .slide-fade {
      animation: slideFade 4s ease-in-out forwards;
    }
    @keyframes slideFade {
      0% { opacity: 0; transform: scale(0.85) translateY(30px); filter: blur(5px); }
      15% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      85% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      100% { opacity: 0; transform: scale(1.1) translateY(-20px); filter: blur(5px); }
    }

    @keyframes fadeOutScreen {
      0% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; pointer-events: none; }
    }
    .romantic-screen {
      animation: fadeOutScreen 17s forwards;
    }

    @keyframes float-gentle {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }
    .cute-bounce:active {
        transform: scale(0.92);
    }
    .cute-float {
        animation: float-gentle 3s ease-in-out infinite;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .toast-animate {
      animation: slideUp 0.3s ease-out forwards;
    }

    .line-through-anim {
      text-decoration: line-through;
      color: #94a3b8;
      transition: all 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    /* TATLI HAYVANLAR (PEEK) ANİMASYONLARI */
    @keyframes peek-bl {
      0%, 100% { transform: translate(-100%, 100%) rotate(-30deg); }
      10%, 20% { transform: translate(10px, -10px) rotate(10deg); }
      30%, 90% { transform: translate(-100%, 100%) rotate(-30deg); }
    }
    .animal-bl { position: fixed; bottom: 0; left: 0; animation: peek-bl 15s infinite ease-in-out; font-size: 3rem; z-index: 100; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    
    @keyframes peek-br {
      0%, 100% { transform: translate(100%, 100%) rotate(30deg); }
      40%, 50% { transform: translate(-10px, -10px) rotate(-10deg); }
      60%, 90% { transform: translate(100%, 100%) rotate(30deg); }
    }
    .animal-br { position: fixed; bottom: 0; right: 0; animation: peek-br 18s infinite ease-in-out; font-size: 3rem; z-index: 100; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    
    @keyframes peek-tl {
      0%, 100% { transform: translate(-100%, -100%) rotate(135deg); }
      60%, 70% { transform: translate(10px, 10px) rotate(180deg); }
      80%, 90% { transform: translate(-100%, -100%) rotate(135deg); }
    }
    .animal-tl { position: fixed; top: 0; left: 0; animation: peek-tl 20s infinite ease-in-out; font-size: 2.5rem; z-index: 100; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

    @keyframes peek-tr {
      0%, 100% { transform: translate(100%, -100%) rotate(-135deg); }
      25%, 35% { transform: translate(-10px, 10px) rotate(-180deg); }
      45%, 90% { transform: translate(100%, -100%) rotate(-135deg); }
    }
    .animal-tr { position: fixed; top: 0; right: 0; animation: peek-tr 22s infinite ease-in-out; font-size: 2.5rem; z-index: 100; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

    @keyframes walk-across {
      0% { transform: translateX(-10vw); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateX(110vw); opacity: 0; }
    }
    .animal-walk { position: fixed; bottom: 15%; left: 0; animation: walk-across 25s infinite linear; font-size: 2rem; opacity: 0.5; z-index: 99; pointer-events: none; }
  </style>
</head>

    // --- YARDIMCI FONKSİYONLAR ---
    const formatCurrency = (value, currency = 'TRY', decimals = 0) => {
        if(currency === 'USD') return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: decimals }).format(value || 0);
        return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: decimals }).format(value || 0);
    };

    const parseCurrency = (val) => {
        if (val === undefined || val === null || val === '') return 0;
        return Number(String(val).replace(/\./g, '').replace(',', '.')) || 0;
    };

    // --- OTOMATİK FORMATLAYAN GİRİŞ BİLEŞENİ ---
    const CurrencyInput = ({ value, onChange, placeholder, className, isAleyna, icon = "₺" }) => {
        const formatVal = (val) => {
            if (val === undefined || val === null || val === '') return '';
            const strVal = String(val);
            const parts = strVal.split(',');
            let integerPart = parts[0].replace(/\D/g, '');
            integerPart = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            let decimalPart = parts.length > 1 ? ',' + parts[1].replace(/\D/g, '').substring(0, 2) : '';
            return strVal.includes(',') && parts.length === 1 ? integerPart + ',' : integerPart + decimalPart;
        };

        const handleChange = (e) => {
            let val = e.target.value;
            val = val.replace(/[^0-9,]/g, '');
            const commaCount = (val.match(/,/g) || []).length;
            if (commaCount > 1) return;
            onChange(val);
        };

        return (
            <div className={`relative w-full ${className || ''}`}>
                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">{icon}</span>
                <input 
                    type="text" 
                    inputMode="decimal"
                    placeholder={placeholder} 
                    value={formatVal(value)} 
                    onChange={handleChange} 
                    className={`w-full pl-8 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`} 
                />
            </div>
        );
    };

    // --- SEVİMLİ HAYVANLAR ANİMASYONU ---

    const Toast = ({ message, type, onClose }) => {

      const showReport = (type) => {
        if (!stats || sortedEntries.length < 2) return showToast("Detaylı analiz için en az 2 haftalık veri girmelisiniz.", "warning");

        let content = "", title = "", icon = "";
        const oldestEntry = sortedEntries[sortedEntries.length - 1];
        const monthsPassed = Math.max(1, (new Date(latestEntry.date) - new Date(oldestEntry.date)) / (1000 * 60 * 60 * 24 * 30));

        switch(type) {
            case 'growth':
                title = "Uzun Vadeli Büyüme Raporu"; icon = "fa-seedling";
                const avgMonthlyGrowth = stats.totalProfit / monthsPassed;
                content = `🎯 Toplamda yatırdığınız ana para: ${formatCurrency(stats.totalInvested)}\n💰 Güncel Ulaşılan Büyüklük: ${formatCurrency(stats.totalCurrent)}\n\n`;
                content += `📈 Sizin disiplinli tasarrufunuz ve yatırımlarınız sayesinde portföyünüz net olarak ${formatCurrency(stats.totalProfit)} (%${stats.totalProfitPercent.toFixed(1)}) reel kâr elde etti.\n\n`;
                content += `⏱️ Aylık Ortalama Kâr Hızınız: ${formatCurrency(avgMonthlyGrowth)} / Ay.\nBu ivmeyle devam ederseniz bileşik getiri gücüyle portföyünüz kartopu etkisi yaratacaktır.`;
                break;
            case 'allocation':
                title = "Stratejik Varlık Dağılımı"; icon = "fa-chart-pie";
                content = `Portföyünüzün piyasa risklerine karşı duruşu:\n\n`;
                content += `🛡️ Güvenli Liman (PPF & Mevduat): %${stats.mmfRatio.toFixed(1)}\n`;
                content += `🌟 Değer Koruma (Altın): %${stats.goldRatio.toFixed(1)}\n`;
                content += `💵 Kur Koruması (Döviz): %${stats.fxRatio.toFixed(1)}\n`;
                content += `🚀 Büyüme Odaklı (Hisseler): %${stats.stockRatio.toFixed(1)}\n\n`;
                if(stats.mmfRatio > 60) content += "Yorum: Oldukça defansif bir yapıdasınız. Faizlerin düşüş trendine girmesi durumunda diğer enstrümanlara geçiş fırsatlarını değerlendirebilirsiniz.";
                else if(stats.stockRatio > 50) content += "Yorum: Agresif bir büyüme stratejisi izliyorsunuz. Borsadaki dalgalanmalar portföyünüzü derinden etkileyebilir, acil nakit ihtiyaçları için likit bir miktar ayırdığınızdan emin olun.";
                else content += "Yorum: Tebrikler! Çeşitlendirilmiş ve oldukça dengeli bir portföy yönetiyorsunuz.";
                break;
            case 'inflation':
                title = "Enflasyon ve Kur Analizi"; icon = "fa-shield-halved";
                const currentUsdRate = marketData.usd || 34.0;
                const portfolioInUsd = stats.totalCurrent / currentUsdRate;
                const investedInUsd = stats.totalInvested / currentUsdRate;
                const netUsdProfit = portfolioInUsd - investedInUsd;
                content = `Mevcut Güncel Kur: ${currentUsdRate.toFixed(2)} ₺\n\n`;
                content += `🌍 Global Satın Alma Gücünüz: ${formatCurrency(portfolioInUsd, 'USD')}\n\n`;
                if(netUsdProfit > 0) {
                    content += `🏆 Harika haber! TL bazındaki kârınız kur artışından daha yüksek. Portföyünüz Dolar bazında da ${formatCurrency(netUsdProfit, 'USD')} değer kazandı. Enflasyona karşı gerçek bir zafer.`;
                } else {
                    content += `⚠️ TL olarak kârda olsanız da, mevcut kur değişimleri sebebiyle portföyünüz Dolar karşısında ${formatCurrency(Math.abs(netUsdProfit), 'USD')} geride görünüyor. Getiri potansiyeli daha yüksek yatırım araçlarını inceleyebilirsiniz.`;
                }
                break;
        }
        setSelectedReport({ title, icon, content });
      };

      if (!loading && !user) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1618044733300-9472054094ee?q=80&w=2071&auto=format&fit=crop')] bg-cover bg-center">
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
            {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
            <div className="relative z-10 w-full max-w-md p-8 m-4 bg-white/95 backdrop-blur-xl rounded-[2rem] shadow-2xl text-center border border-white/20 animate-fade-in">
              <div className="w-20 h-20 bg-gradient-to-tr from-indigo-600 to-emerald-400 rounded-3xl mx-auto flex items-center justify-center shadow-lg mb-6 transform rotate-12">
                <i className="fa-solid fa-chart-line text-4xl text-white -rotate-12"></i>
              </div>
              <h1 className="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">Portföy<span className="text-indigo-600">Pro</span></h1>
              <p className="text-slate-500 font-medium mb-10">Ali & Aleyna - Finansal Özgürlük Paneli</p>
              <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 px-6 rounded-2xl hover:bg-slate-50 hover:border-indigo-200 hover:text-indigo-600 transition-all shadow-sm active:scale-95">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" className="w-6 h-6" />
                Google ile Giriş Yap
              </button>
            </div>
          </div>
        );
      }

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div className="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <p className="text-slate-600 font-bold tracking-wide animate-pulse">Sistem Hazırlanıyor...</p>
          </div>
        );
      }

      const targetAmount = settings.targetAmount || 0;
      const targetProgress = targetAmount > 0 && stats ? Math.min((stats.totalCurrent / targetAmount) * 100, 100) : 0;
      const totalGoldEquivalent = stats && marketData.gold ? (stats.totalCurrent / marketData.gold).toFixed(2) : 0;

      const activeLoans = debts.filter(d => d.debtType === 'loan' && (d.paidInstallments || 0) < (d.totalInstallments || 0));
      const activeCards = debts.filter(d => d.debtType === 'card' && d.totalAmount > 0);
      const totalActiveDebt = [...activeLoans, ...activeCards].reduce((sum, d) => sum + d.totalAmount, 0);

      return (
        <div className={`max-w-md md:max-w-5xl mx-auto min-h-screen relative z-10 ${isAleyna ? 'bg-pink-50/30' : ''}`}>
          
          <CuteAnimals isAleyna={isAleyna} />
          {isAleyna && <AleynaThemeEffects />}

          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          <ReportModal isOpen={selectedReport !== null} onClose={() => setSelectedReport(null)} {...selectedReport} isAleyna={isAleyna} />
          <RomanticGreeting isOpen={showRomanticGreeting} />

          {/* APP HEADER */}
          <header className={`bg-gradient-to-b ${isAleyna ? 'from-rose-900 to-pink-900' : 'from-slate-900 to-slate-800'} text-white pt-10 pb-6 px-6 md:rounded-b-3xl shadow-xl relative overflow-hidden transition-colors duration-1000`}>
            <div className={`absolute top-0 right-0 w-64 h-64 ${isAleyna ? 'bg-pink-400' : 'bg-indigo-500'} opacity-20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3`}></div>
            {isAleyna && <span className="absolute top-10 right-10 text-3xl opacity-20 cute-float">🐱</span>}
            
            {/* MOTİVASYON SÖZÜ */}
            <div className="relative z-10 text-center mb-6 px-4">
                <p className="text-xs md:text-sm font-medium text-white/80 italic drop-shadow-md">"{quote}"</p>
            </div>

            <div className="relative z-10 flex justify-between items-center mb-6">
              <div className="flex items-center gap-3">
                {user?.photoURL ? (
                    <img src={user.photoURL} alt="Profil" className={`w-12 h-12 rounded-full border-2 ${isAleyna ? 'border-pink-300' : 'border-slate-700'} shadow-md`} />
                ) : (
                    <div className={`w-12 h-12 ${isAleyna ? 'bg-pink-500' : 'bg-indigo-600'} rounded-full flex items-center justify-center font-bold text-xl border-2 ${isAleyna ? 'border-pink-300' : 'border-slate-700'}`}>
                        {user?.displayName ? user.displayName.charAt(0) : 'A'}
                    </div>
                )}
                <div>
                  <p className="text-slate-300 text-xs font-bold tracking-wider uppercase">Hoş Geldin</p>
                  <h1 className="text-xl font-extrabold flex items-center gap-2">
                    {user?.displayName?.split(' ')[0] || 'Yatırımcı'} 
                    {isAleyna && <span className="text-sm">🌸</span>}
                  </h1>
                </div>
              </div>
              <button onClick={handleLogout} className={`w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white/70 hover:bg-rose-500/40 hover:text-white transition border ${isAleyna ? 'border-pink-500/50' : 'border-slate-600'}`}>
                <i className="fa-solid fa-arrow-right-from-bracket"></i>
              </button>
            </div>

            {/* LIVE MARKET TICKER */}
            <div className="relative z-10 flex gap-3 overflow-x-auto hide-scrollbar pb-2 snap-x">
                <div className="snap-start shrink-0 bg-white/10 backdrop-blur border border-white/10 rounded-xl p-3 min-w-[120px]">
                    <p className="text-white/60 text-[10px] font-bold uppercase"><i className="fa-solid fa-dollar-sign mr-1"></i> USD/TRY</p>
                    <p className="text-white font-black mt-1">{marketData.usd ? marketData.usd.toFixed(2) : '...'}</p>
                </div>
                <div className="snap-start shrink-0 bg-white/10 backdrop-blur border border-white/10 rounded-xl p-3 min-w-[120px]">
                    <p className="text-white/60 text-[10px] font-bold uppercase"><i className="fa-solid fa-euro-sign mr-1"></i> EUR/TRY</p>
                    <p className="text-white font-black mt-1">{marketData.eur ? marketData.eur.toFixed(2) : '...'}</p>
                </div>
                <div className="snap-start shrink-0 bg-white/10 backdrop-blur border border-white/10 rounded-xl p-3 min-w-[120px]">
                    <p className="text-white/60 text-[10px] font-bold uppercase"><i className="fa-solid fa-coins mr-1"></i> G. Altın</p>
                    <p className="text-amber-300 font-black mt-1">{marketData.gold ? marketData.gold.toFixed(2) : '...'}</p>
                </div>
            </div>
          </header>

          {/* NAVIGATION */}
          <nav className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-100 z-40 md:sticky md:top-0 md:border-t-0 md:border-b md:bg-white/90 md:backdrop-blur-md pb-safe">
            <div className="max-w-md md:max-w-5xl mx-auto flex px-2 py-3 md:py-4 gap-1 relative overflow-x-auto hide-scrollbar whitespace-nowrap">
              
              <button onClick={() => setActiveTab('dashboard')} className={`shrink-0 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 px-3 py-2 rounded-2xl transition ${activeTab === 'dashboard' ? (isAleyna ? 'text-pink-600 bg-pink-50' : 'text-indigo-600 bg-indigo-50') : 'text-slate-400 hover:bg-slate-50'}`}>
                <i className={`${isAleyna && activeTab === 'dashboard' ? 'fa-solid fa-heart' : 'fa-solid fa-layer-group'} text-xl md:text-lg ${isAleyna && activeTab === 'dashboard' ? 'cute-float' : ''}`}></i>
                <span className="text-[10px] md:text-sm font-bold">Özet</span>
              </button>

              <button onClick={() => setActiveTab('budget')} className={`shrink-0 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 px-3 py-2 rounded-2xl transition ${activeTab === 'budget' ? (isAleyna ? 'text-pink-600 bg-pink-50' : 'text-indigo-600 bg-indigo-50') : 'text-slate-400 hover:bg-slate-50'}`}>
                <i className={`fa-solid fa-wallet text-xl md:text-lg ${isAleyna && activeTab === 'budget' ? 'cute-float' : ''}`}></i>
                <span className="text-[10px] md:text-sm font-bold">Bütçe</span>
              </button>

              <button onClick={() => setActiveTab('debts')} className={`shrink-0 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 px-3 py-2 rounded-2xl transition ${activeTab === 'debts' ? (isAleyna ? 'text-pink-600 bg-pink-50' : 'text-indigo-600 bg-indigo-50') : 'text-slate-400 hover:bg-slate-50'}`}>
                <i className={`fa-solid fa-credit-card text-xl md:text-lg ${isAleyna && activeTab === 'debts' ? 'cute-float' : ''}`}></i>
                <span className="text-[10px] md:text-sm font-bold">{isAleyna ? 'Taksitler 💸' : 'Borçlar'}</span>
              </button>
              
              <button onClick={() => setActiveTab('houses')} className={`shrink-0 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 px-3 py-2 rounded-2xl transition ${activeTab === 'houses' ? (isAleyna ? 'text-pink-600 bg-pink-50' : 'text-indigo-600 bg-indigo-50') : 'text-slate-400 hover:bg-slate-50'}`}>
                <i className={`fa-solid fa-house text-xl md:text-lg ${isAleyna && activeTab === 'houses' ? 'cute-float' : ''}`}></i>
                <span className="text-[10px] md:text-sm font-bold">{isAleyna ? 'Evimiz' : 'Ev Adayları'}</span>
              </button>

              <button onClick={() => setActiveTab('dowry')} className={`shrink-0 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 px-3 py-2 rounded-2xl transition ${activeTab === 'dowry' ? (isAleyna ? 'text-pink-600 bg-pink-50' : 'text-indigo-600 bg-indigo-50') : 'text-slate-400 hover:bg-slate-50'}`}>
                <i className={`fa-solid fa-ring text-xl md:text-lg ${isAleyna && activeTab === 'dowry' ? 'cute-float' : ''}`}></i>
                <span className="text-[10px] md:text-sm font-bold">{isAleyna ? 'Çeyizimiz💖' : 'Çeyiz/Eşya'}</span>
              </button>

              <button onClick={() => setActiveTab('media')} className={`shrink-0 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 px-3 py-2 rounded-2xl transition ${activeTab === 'media' ? (isAleyna ? 'text-pink-600 bg-pink-50' : 'text-indigo-600 bg-indigo-50') : 'text-slate-400 hover:bg-slate-50'}`}>
                <i className={`fa-solid fa-film text-xl md:text-lg ${isAleyna && activeTab === 'media' ? 'cute-float' : ''}`}></i>
                <span className="text-[10px] md:text-sm font-bold">Kültür Sanat</span>
              </button>

              <button onClick={() => setActiveTab('add')} className={`shrink-0 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 px-3 py-2 rounded-2xl transition ${activeTab === 'add' ? (isAleyna ? 'text-pink-600 bg-pink-50' : 'text-indigo-600 bg-indigo-50') : 'text-slate-400 hover:bg-slate-50'}`}>
                <i className={`${isAleyna && activeTab === 'add' ? 'fa-solid fa-paw' : 'fa-solid fa-circle-plus'} text-xl md:text-lg ${isAleyna && activeTab === 'add' ? 'cute-float' : ''}`}></i>
                <span className="text-[10px] md:text-sm font-bold">Portföy Gir</span>
              </button>
              
              <button onClick={() => setActiveTab('history')} className={`shrink-0 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 px-3 py-2 rounded-2xl transition ${activeTab === 'history' ? (isAleyna ? 'text-pink-600 bg-pink-50' : 'text-indigo-600 bg-indigo-50') : 'text-slate-400 hover:bg-slate-50'}`}>
                <i className={`${isAleyna && activeTab === 'history' ? 'fa-solid fa-cat' : 'fa-solid fa-clock-rotate-left'} text-xl md:text-lg ${isAleyna && activeTab === 'history' ? 'cute-float' : ''}`}></i>
                <span className="text-[10px] md:text-sm font-bold">Geçmiş</span>
              </button>
              
            </div>
          </nav>

          {/* MAIN CONTENT AREA */}
          <main className="p-4 md:p-6 space-y-6 relative z-10">
            
            {/* --- DASHBOARD TAB --- */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6 pb-6 animate-fade-in relative">
                
                {/* YAKLAŞAN BORÇ UYARISI */}
                {totalActiveDebt > 0 && (
                    <div className={`bg-rose-50 border border-rose-200 text-rose-700 p-4 rounded-2xl flex items-center justify-between shadow-sm animate-pulse`}>
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-circle-exclamation text-xl"></i>
                            <span className="font-bold text-sm">Dikkat: Toplam {formatCurrency(totalActiveDebt)} aktif borcunuz bulunuyor. Taksitleri aksatmayın!</span>
                        </div>
                        <button onClick={() => setActiveTab('debts')} className="text-xs font-black bg-rose-200 px-3 py-1.5 rounded-lg hover:bg-rose-300 transition">İncele</button>
                    </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                   {(specialDates.engDays !== null || specialDates.marDays !== null) && (
                       <div className={`bg-gradient-to-br ${isAleyna ? 'from-rose-50 to-pink-50 border-pink-100' : 'from-indigo-50 to-purple-50 border-indigo-100'} rounded-3xl p-5 shadow-sm border relative overflow-hidden flex flex-col justify-center`}>
                           <i className={`fa-solid fa-calendar-heart absolute -right-4 -bottom-4 text-[100px] ${isAleyna ? 'text-pink-500/10' : 'text-indigo-500/10'} transform -rotate-12`}></i>
                           <h3 className={`text-base font-extrabold ${isAleyna ? 'text-pink-700' : 'text-indigo-800'} mb-3 flex items-center gap-2`}>
                               <i className="fa-solid fa-heart-pulse"></i> Aşk Takvimimiz
                           </h3>
                           <div className="space-y-2 relative z-10">
                               {specialDates.engDays !== null && (
                                   <div className="flex justify-between items-center bg-white/60 p-3 rounded-xl">
                                      <span className="text-xs font-bold text-slate-600">Nişanlanalı</span>
                                      <span className={`text-sm font-black ${isAleyna ? 'text-pink-600' : 'text-indigo-600'}`}>{specialDates.engDays} Gün Oldu 💍</span>
                                   </div>
                               )}
                               {specialDates.marDays !== null && (
                                   <div className="flex justify-between items-center bg-white/60 p-3 rounded-xl">
                                      <span className="text-xs font-bold text-slate-600">{specialDates.isMarriageFuture ? 'Düğüne Kalan' : 'Evleneli'}</span>
                                      <span className={`text-sm font-black ${isAleyna ? 'text-rose-600' : 'text-purple-600'}`}>{specialDates.marDays} Gün {specialDates.isMarriageFuture ? 'Kaldı 👰‍♀️🤵' : 'Oldu 🎉'}</span>
                                   </div>
                               )}
                           </div>
                       </div>
                   )}

                   {budgetStats?.latestSalary && (
                       <div className={`bg-gradient-to-br ${isAleyna ? 'from-pink-50 to-orange-50 border-pink-100' : 'from-blue-50 to-emerald-50 border-blue-100'} rounded-3xl p-5 shadow-sm border relative overflow-hidden flex flex-col justify-between`}>
                           <h3 className={`text-base font-extrabold ${isAleyna ? 'text-pink-700' : 'text-blue-800'} mb-3 flex items-center gap-2`}>
                               <i className="fa-solid fa-wallet"></i> Aylık Kalan Nakit Durumu
                           </h3>
                           <div className="flex justify-between items-end mb-2 relative z-10 border-b border-slate-200/50 pb-2">
                              <div>
                                  <h2 className={`text-3xl font-black ${budgetStats.remainingSalary >= 0 ? (isAleyna ? 'text-pink-600' : 'text-emerald-600') : 'text-rose-600'}`}>
                                      {formatCurrency(budgetStats.remainingSalary)}
                                  </h2>
                              </div>
                              <div className="text-right">
                                  <p className="text-[10px] font-bold text-slate-500 uppercase">Günlük Limitiniz</p>
                                  <p className="text-lg font-black text-blue-600">{formatCurrency(budgetStats.dailyBudget)}</p>
                              </div>
                           </div>
                           
                           {/* MAAŞ - BORÇ - HARCAMA DETAYI */}
                           <div className="flex justify-between text-[10px] font-bold text-slate-500 mb-2">
                               <span>Maaşlar: {formatCurrency(budgetStats.latestSalary.totalAmount)}</span>
                               <span>Sabit Yük: -{formatCurrency(budgetStats.totalExpenseAmount + budgetStats.totalDebtPayments + budgetStats.totalSubPayments)}</span>
                           </div>
                           
                           {budgetStats.investedPercent > 0 && (
                               <div className={`mt-1 p-2 rounded-xl ${budgetStats.investedPercent > 30 ? 'bg-amber-100 text-amber-700' : (isAleyna ? 'bg-pink-100/50 text-pink-700' : 'bg-emerald-100/50 text-emerald-700')} text-xs font-bold flex items-center gap-2`}>
                                   <i className={`fa-solid ${budgetStats.investedPercent > 30 ? 'fa-trophy' : 'fa-medal'} text-lg`}></i>
                                   <span>{budgetStats.investedPercent > 30 ? 'Tasarruf Şampiyonu! ' : 'Harika! '} Maaşın <b>%{budgetStats.investedPercent.toFixed(1)}</b>'i yatırıma gitti.</span>
                               </div>
                           )}
                       </div>
                   )}
                </div>

                {!stats ? (
                  <div className={`bg-white p-10 text-center rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} flex flex-col items-center relative overflow-hidden`}>
                    {isAleyna && <span className="absolute top-4 right-4 text-3xl opacity-20">🐾</span>}
                    <div className={`w-24 h-24 ${isAleyna ? 'bg-pink-50 text-pink-400' : 'bg-slate-50 text-slate-300'} rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner`}>
                      <i className={`fa-solid ${isAleyna ? 'fa-cat' : 'fa-vault'}`}></i>
                    </div>
                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">Portföyünüz Boş</h3>
                    <p className="text-slate-500 mt-2 font-medium">Büyük yolculuklar tek bir adımla başlar. İlk aylık ve haftalık yatırımınızı girerek serüveni başlatın.</p>
                    <button onClick={() => setActiveTab('add')} className={`mt-8 ${isAleyna ? 'bg-pink-500 hover:bg-pink-600 shadow-pink-500/30' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/30'} cute-bounce text-white px-8 py-4 rounded-2xl font-bold transition shadow-xl active:scale-95 flex items-center gap-2`}>
                      İlk Kaydı Oluştur {isAleyna && <span>✨</span>}
                    </button>
                  </div>
                ) : (
                  <>
                    {targetAmount > 0 && (
                        <div className={`bg-white rounded-[2rem] p-6 shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'}`}>
                            <div className="flex justify-between items-end mb-3">
                                <div>
                                    <h3 className={`text-base font-extrabold ${isAleyna ? 'text-pink-600' : 'text-indigo-600'} flex items-center gap-2`}>
                                        <i className="fa-solid fa-bullseye"></i> Portföy Hedefimiz
                                    </h3>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-0.5">HEDEF TUTAR</p>
                                    <p className="text-sm font-black text-slate-700">{formatCurrency(targetAmount)}</p>
                                </div>
                            </div>
                            <div className="w-full bg-slate-100 rounded-full h-4 mb-2 overflow-hidden border border-slate-100 relative">
                                <div className={`${isAleyna ? 'bg-gradient-to-r from-pink-400 to-rose-500' : 'bg-gradient-to-r from-indigo-400 to-blue-500'} h-full rounded-full transition-all duration-1000 relative`} style={{ width: `${targetProgress}%` }}>
                                    <div className="absolute inset-0 bg-white/20 animate-pulse"></div>
                                </div>
                            </div>
                            <div className="flex justify-between text-[11px] font-black uppercase">
                                <span className={isAleyna ? 'text-pink-600' : 'text-indigo-600'}>%{targetProgress.toFixed(1)} TAMAMLANDI</span>
                                <span className="text-slate-400">KALAN: {formatCurrency(targetAmount - stats.totalCurrent)}</span>
                            </div>
                        </div>
                    )}

                    <div className={`bg-gradient-to-br ${isAleyna ? 'from-rose-500 via-pink-600 to-purple-600 shadow-pink-600/30' : 'from-indigo-900 via-slate-900 to-slate-900 shadow-indigo-900/20'} rounded-[2rem] p-6 md:p-8 shadow-2xl text-white relative overflow-hidden transition-colors duration-1000`}>
                      <i className={`fa-solid ${isAleyna ? 'fa-heart' : 'fa-wallet'} absolute -right-6 -bottom-6 text-[150px] text-white/10 transform -rotate-12`}></i>
                      
                      <div className="flex justify-between items-start relative z-10">
                        <div>
                          <p className={`${isAleyna ? 'text-pink-100' : 'text-indigo-200'} text-sm font-bold tracking-widest uppercase mb-1 flex items-center gap-2`}>
                            Toplam Net Varlık {isAleyna && <span className="cute-float text-lg">🌸</span>}
                          </p>
                          <h2 className="text-4xl md:text-5xl font-black tracking-tighter">{formatCurrency(stats.totalCurrent)}</h2>
                          
                          {marketData.gold > 0 && (
                            <p className={`mt-2 text-xs font-bold px-3 py-1 rounded-full inline-block ${isAleyna ? 'bg-pink-900/50 text-pink-200' : 'bg-slate-800 text-amber-300'} border border-white/10`}>
                                <i className="fa-solid fa-coins"></i> Yaklaşık {totalGoldEquivalent} Gram Altın
                            </p>
                          )}
                        </div>
                        {/* ANA EKRANDAN DÜZENLEME BUTONU */}
                        <button onClick={() => handleEditEntry(latestEntry)} className={`hidden md:flex cute-bounce px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition text-sm font-bold items-center gap-2 backdrop-blur-sm border border-white/20`}>
                            <i className="fa-solid fa-pen-to-square"></i> Son Kaydı Düzenle
                        </button>
                      </div>
                      
                      <div className="mt-8 pt-6 border-t border-white/20 grid grid-cols-2 md:grid-cols-3 gap-4 relative z-10">
                        <div>
                          <p className="text-white/60 text-xs font-bold uppercase mb-1">Toplam Yatırılan</p>
                          <p className="text-xl font-bold">{formatCurrency(stats.totalInvested)}</p>
                        </div>
                        <div>
                          <p className="text-white/60 text-xs font-bold uppercase mb-1">Net Kâr / Zarar</p>
                          <p className={`text-xl font-bold flex items-center gap-1 text-white`}>
                            <i className={`fa-solid ${stats.totalProfit >= 0 ? 'fa-arrow-trend-up text-emerald-300' : 'fa-arrow-trend-down text-rose-300'} text-sm`}></i>
                            {stats.totalProfit >= 0 ? '+' : ''}{formatCurrency(stats.totalProfit)}
                          </p>
                        </div>
                        <div className="col-span-2 md:col-span-1">
                          <p className="text-white/60 text-xs font-bold uppercase mb-1 flex items-center gap-1"><i className="fa-solid fa-shield-cat"></i> Acil Durum Fonu</p>
                          <p className="text-xl font-bold text-amber-300">{formatCurrency(latestEntry?.emergencyFund || 0)}</p>
                        </div>
                      </div>
                      
                      {/* MOBİL İÇİN DÜZENLE BUTONU */}
                      <button onClick={() => handleEditEntry(latestEntry)} className={`md:hidden mt-6 w-full cute-bounce py-3 rounded-xl bg-white/10 hover:bg-white/20 transition text-sm font-bold flex items-center justify-center gap-2 backdrop-blur-sm border border-white/20`}>
                          <i className="fa-solid fa-pen-to-square"></i> Son Kaydı Düzenle
                      </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {/* VARLIK DAĞILIMI */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 h-full">
                            <h3 className="text-lg font-extrabold text-slate-800 mb-5 flex items-center gap-2">
                                <i className={`fa-solid fa-chart-pie ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Varlık Dağılımı
                            </h3>
                            <div className="flex h-4 rounded-full overflow-hidden mb-5 bg-slate-100">
                                {stats.mmfRatio > 0 && <div style={{width: `${stats.mmfRatio}%`}} className="bg-emerald-500 h-full transition-all"></div>}
                                {stats.goldRatio > 0 && <div style={{width: `${stats.goldRatio}%`}} className="bg-amber-400 h-full transition-all"></div>}
                                {stats.fxRatio > 0 && <div style={{width: `${stats.fxRatio}%`}} className="bg-blue-500 h-full transition-all"></div>}
                                {stats.stockRatio > 0 && <div style={{width: `${stats.stockRatio}%`}} className="bg-rose-500 h-full transition-all"></div>}
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-emerald-500"></div><div><p className="text-[10px] font-bold text-slate-400 uppercase">Para Piy.</p><p className="text-sm font-bold text-slate-800">%{stats.mmfRatio.toFixed(1)}</p></div></div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-amber-400"></div><div><p className="text-[10px] font-bold text-slate-400 uppercase">Altın Fonu</p><p className="text-sm font-bold text-slate-800">%{stats.goldRatio.toFixed(1)}</p></div></div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-blue-500"></div><div><p className="text-[10px] font-bold text-slate-400 uppercase">Döviz</p><p className="text-sm font-bold text-slate-800">%{stats.fxRatio.toFixed(1)}</p></div></div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-rose-500"></div><div><p className="text-[10px] font-bold text-slate-400 uppercase">Hisse</p><p className="text-sm font-bold text-slate-800">%{stats.stockRatio.toFixed(1)}</p></div></div>
                            </div>
                        </div>

                        {/* AYLIK HARCAMA GRAFİĞİ (PIE) */}
                        {window.Recharts && budgetStats?.expenseCategoryData && budgetStats.expenseCategoryData.length > 0 ? (
                            <div className={`bg-white rounded-[2rem] p-6 shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} relative`}>
                                <h3 className="text-lg font-extrabold text-slate-800 mb-2 flex items-center gap-2">
                                    <i className={`fa-solid fa-chart-pie ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Bu Ayın Harcamaları
                                </h3>
                                <div className="h-40 w-full mt-2">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={budgetStats.expenseCategoryData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={40} outerRadius={70} paddingAngle={2}>
                                                {budgetStats.expenseCategoryData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={CHART_COLORS[index % CHART_COLORS.length]} />
                                                ))}
                                            </Pie>
                                            <Tooltip formatter={(val) => formatCurrency(val)} contentStyle={{borderRadius: '1rem', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)'}}/>
                                            <Legend iconType="circle" wrapperStyle={{fontSize: '11px', fontWeight: 'bold', color: '#475569'}} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        ) : (
                            <div className={`bg-gradient-to-br ${isAleyna ? 'from-pink-50 to-rose-50 border-pink-100' : 'from-emerald-50 to-teal-50 border-emerald-100'} rounded-3xl p-6 shadow-sm border h-full flex flex-col justify-center relative overflow-hidden`}>
                                {isAleyna && <span className="absolute -right-4 -bottom-4 text-6xl opacity-10">🐱</span>}
                                <i className={`fa-solid fa-hand-holding-dollar absolute -right-2 -bottom-2 text-[80px] ${isAleyna ? 'text-pink-500/10' : 'text-emerald-500/10'} transform -rotate-12`}></i>
                                <p className={`${isAleyna ? 'text-pink-600' : 'text-emerald-700'} text-xs font-bold tracking-widest uppercase mb-2 flex items-center gap-2`}>
                                    Toplam Pasif Gelir / Temettü {isAleyna && <span className="text-lg">💖</span>}
                                </p>
                                <h2 className={`text-4xl font-black ${isAleyna ? 'text-pink-700' : 'text-emerald-800'} tracking-tighter`}>
                                    {formatCurrency(stats.totalPassiveIncome)}
                                </h2>
                                <p className={`mt-3 text-xs font-medium ${isAleyna ? 'text-pink-500' : 'text-emerald-600'}`}>* Yatırımlarınızın size çalışarak kazandırdığı toplam nakit tutardır.</p>
                            </div>
                        )}
                    </div>

                    {/* MODÜL ÖZET GRAFİKLERİ */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        {/* ÇEYİZ GRAFİĞİ */}
                        {window.Recharts && (dowrySpent > 0 || dowryPending > 0) && (
                            <div className={`bg-white rounded-3xl p-5 shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} relative`}>
                                <h3 className="text-sm font-extrabold text-slate-800 mb-2 flex items-center gap-2">
                                    <i className="fa-solid fa-ring text-amber-400"></i> Çeyiz Durumu
                                </h3>
                                <div className="h-32 w-full relative z-10">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={dowryChartData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={30} outerRadius={50} paddingAngle={2}>
                                                <Cell fill={isAleyna ? '#ec4899' : '#10b981'} />
                                                <Cell fill="#e2e8f0" />
                                            </Pie>
                                            <Tooltip formatter={(val) => formatCurrency(val)} contentStyle={{borderRadius: '0.5rem', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}}/>
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="flex justify-between text-[10px] font-bold px-1 relative z-10 mt-2">
                                    <span className={isAleyna ? 'text-pink-600' : 'text-emerald-600'}>Alındı: {formatCurrency(dowrySpent)}</span>
                                    <span className="text-slate-400">Kalan: {formatCurrency(dowryPending)}</span>
                                </div>
                            </div>
                        )}

                        {/* EV ADAYLARI GRAFİĞİ */}
                        {window.Recharts && houseChartData.length > 0 && (
                            <div className={`bg-white rounded-3xl p-5 shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} relative`}>
                                <h3 className="text-sm font-extrabold text-slate-800 mb-2 flex items-center gap-2">
                                    <i className={`fa-solid fa-house ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Ev Endeksi
                                </h3>
                                <div className="h-32 w-full relative z-10">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={houseChartData}>
                                            <Tooltip formatter={(val) => formatCurrency(val)} cursor={{fill: 'transparent'}} contentStyle={{borderRadius: '0.5rem', border: 'none', fontSize: '12px'}}/>
                                            <Bar dataKey="Fiyat" fill={themeHex} radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {/* MEDYA GRAFİĞİ */}
                        {window.Recharts && mediaStatsData.some(m => m.Adet > 0) && (
                            <div className={`bg-white rounded-3xl p-5 shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} relative`}>
                                <h3 className="text-sm font-extrabold text-slate-800 mb-2 flex items-center gap-2">
                                    <i className={`fa-solid fa-book-open-reader ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Kültür Sanat
                                </h3>
                                <div className="h-32 w-full relative z-10">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={mediaStatsData} layout="vertical" margin={{top:0, right:10, left:-20, bottom:0}}>
                                            <XAxis type="number" hide />
                                            <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fontSize: 10, fill: '#64748b'}} />
                                            <Tooltip cursor={{fill: 'transparent'}} contentStyle={{borderRadius: '0.5rem', border: 'none', fontSize: '12px'}}/>
                                            <Bar dataKey="Adet" fill={isAleyna ? '#f472b6' : '#38bdf8'} radius={[0, 4, 4, 0]} barSize={15} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}
                    </div>

                    <div>
                      <h3 className="text-lg font-extrabold text-slate-800 mb-4 px-1 flex items-center gap-2">
                        <i className={`fa-solid fa-bolt ${isAleyna ? 'text-pink-500' : 'text-amber-500'}`}></i> Akıllı Raporlar
                      </h3>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <button onClick={() => showReport('growth')} className={`bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-3 hover:shadow-md transition text-left group ${isAleyna ? 'hover:border-pink-200' : ''}`}>
                          <div className={`w-12 h-12 ${isAleyna ? 'bg-pink-50 text-pink-500' : 'bg-emerald-50 text-emerald-600'} rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform`}><i className="fa-solid fa-seedling"></i></div>
                          <div><h4 className="font-extrabold text-slate-800 text-base">Uzun Vadeli Büyüme</h4><p className="text-xs text-slate-500 mt-1 font-medium leading-relaxed">Aylık ortalama büyüme hızınız ve kar topu etkisi analizi.</p></div>
                        </button>
                        <button onClick={() => showReport('allocation')} className={`bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-3 hover:shadow-md transition text-left group ${isAleyna ? 'hover:border-pink-200' : ''}`}>
                          <div className={`w-12 h-12 ${isAleyna ? 'bg-purple-50 text-purple-500' : 'bg-indigo-50 text-indigo-600'} rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform`}><i className="fa-solid fa-chart-pie"></i></div>
                          <div><h4 className="font-extrabold text-slate-800 text-base">Varlık Dağılımı</h4><p className="text-xs text-slate-500 mt-1 font-medium leading-relaxed">Risk profiliniz ve mevcut dağılımınızın güvenilirlik analizi.</p></div>
                        </button>
                        <button onClick={() => showReport('inflation')} className={`bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-3 hover:shadow-md transition text-left group ${isAleyna ? 'hover:border-pink-200' : ''}`}>
                          <div className={`w-12 h-12 ${isAleyna ? 'bg-rose-50 text-rose-500' : 'bg-amber-50 text-amber-500'} rounded-2xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform`}><i className="fa-solid fa-shield-halved"></i></div>
                          <div><h4 className="font-extrabold text-slate-800 text-base">Enflasyon & Kur Raporu</h4><p className="text-xs text-slate-500 mt-1 font-medium leading-relaxed">Portföyünüzün Dolar karşısındaki gerçek satın alma gücü.</p></div>
                        </button>
                      </div>
                    </div>
                  </>
                )}
              </div>
            )}

            {/* --- BÜTÇE SEKME --- */}
            {activeTab === 'budget' && (
              <div className="space-y-6 pb-6 animate-fade-in relative">
                  
                  <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-6 md:p-8 relative`}>
                      <h2 className="text-2xl font-black text-slate-900 tracking-tight flex items-center gap-2 mb-6">
                          <i className={`fa-solid fa-money-bill-wave ${isAleyna ? 'text-pink-500' : 'text-emerald-500'}`}></i> Detaylı Maaş/Hak Ediş Girişi
                      </h2>
                      <p className="text-slate-500 text-sm mb-6 font-medium">Gelirlerinizi ayrıntılı girdiğinizde bir önceki dönemin harcamaları sıfırlanır ve yeni bütçe döngünüz başlar.</p>
                      
                      <form onSubmit={handleSaveSalary} className="space-y-4">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                              <div className="space-y-2">
                                  <label className="text-xs font-bold text-slate-400 uppercase ml-2">Ali'nin Maaşı</label>
                                  <CurrencyInput value={aliSalary} onChange={setAliSalary} placeholder="Ali Maaş (TL)" isAleyna={isAleyna} />
                              </div>
                              <div className="space-y-2">
                                  <label className={`text-xs font-bold ${isAleyna ? 'text-pink-400' : 'text-slate-400'} uppercase ml-2`}>Aleyna'nın Maaşı {isAleyna && '💖'}</label>
                                  <CurrencyInput value={aleynaSalary} onChange={setAleynaSalary} placeholder="Aleyna Maaş (TL)" isAleyna={isAleyna} />
                              </div>
                              <div className="space-y-2">
                                  <label className="text-xs font-bold text-slate-400 uppercase ml-2">Ali Yemek & Yol</label>
                                  <div className="flex gap-2">
                                      <CurrencyInput value={aliFood} onChange={setAliFood} placeholder="Yemek" icon="🍔" isAleyna={isAleyna} />
                                      <CurrencyInput value={aliTransport} onChange={setAliTransport} placeholder="Yol" icon="🚌" isAleyna={isAleyna} />
                                  </div>
                              </div>
                              <div className="space-y-2">
                                  <label className={`text-xs font-bold ${isAleyna ? 'text-pink-400' : 'text-slate-400'} uppercase ml-2`}>Aleyna Yemek & Yol</label>
                                  <div className="flex gap-2">
                                      <CurrencyInput value={aleynaFood} onChange={setAleynaFood} placeholder="Yemek" icon="🍔" isAleyna={isAleyna} />
                                      <CurrencyInput value={aleynaTransport} onChange={setAleynaTransport} placeholder="Yol" icon="🚌" isAleyna={isAleyna} />
                                  </div>
                              </div>
                          </div>
                          
                          <div className={`mt-4 p-4 rounded-xl flex justify-between items-center bg-slate-50 border border-slate-100`}>
                              <span className="font-bold text-slate-500 uppercase text-sm">Toplam Hane Geliri:</span>
                              <span className={`text-2xl font-black ${isAleyna ? 'text-pink-600' : 'text-emerald-600'}`}>
                                  {formatCurrency(parseCurrency(aliSalary) + parseCurrency(aleynaSalary) + parseCurrency(aliFood) + parseCurrency(aleynaFood) + parseCurrency(aliTransport) + parseCurrency(aleynaTransport))}
                              </span>
                          </div>

                          <button type="submit" className={`cute-bounce w-full text-white font-bold py-4 rounded-2xl shadow-xl transition flex justify-center items-center gap-2 shrink-0 ${isAleyna ? 'bg-pink-500 hover:bg-pink-600 shadow-pink-500/30' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-600/30'}`}>
                              <i className="fa-solid fa-check"></i> Bütçe Dönemini Başlat
                          </button>
                      </form>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                      {/* HARCAMALAR */}
                      <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-6 relative`}>
                          <h2 className="text-xl font-black text-slate-900 tracking-tight flex items-center gap-2 mb-4">
                              <i className={`fa-solid fa-cart-shopping ${isAleyna ? 'text-pink-500' : 'text-rose-500'}`}></i> Harcamalar
                          </h2>
                          <form onSubmit={handleSaveExpense} className="flex flex-col gap-3 mb-6 bg-slate-50 p-4 rounded-[1.5rem] border border-slate-200">
                              <div className="flex gap-2">
                                  <input type="text" required placeholder="Harcama Adı" value={expenseName} onChange={(e) => setExpenseName(e.target.value)} className={`flex-1 px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-sm transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-rose-500/10 focus:border-rose-500'}`} />
                                  <select value={expenseCat} onChange={(e) => setExpenseCat(e.target.value)} className={`w-1/3 px-2 py-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-xs transition focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-rose-500/10 focus:border-rose-500'}`}>
                                      {EXPENSE_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                  </select>
                              </div>
                              <div className="flex gap-2">
                                  <CurrencyInput value={expenseAmount} onChange={setExpenseAmount} placeholder="Tutar" isAleyna={isAleyna} className={isAleyna ? 'focus:border-pink-500' : 'focus:border-rose-500'} />
                                  <button type="submit" className={`cute-bounce text-white font-bold py-3 px-6 rounded-xl transition flex justify-center items-center shrink-0 ${isAleyna ? 'bg-pink-500 hover:bg-pink-600' : 'bg-slate-900 hover:bg-slate-800'}`}>
                                      Ekle
                                  </button>
                              </div>
                          </form>

                          <div className="space-y-3">
                              <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-3">Dönem Harcamaları</h4>
                              {budgetStats?.currentExpenses.map(ex => (
                                  <div key={ex.id} className="flex justify-between items-center bg-white border border-slate-100 p-3 rounded-xl hover:bg-slate-50 transition">
                                      <div className="flex flex-col">
                                          <span className="font-bold text-slate-700">{ex.name}</span>
                                          <span className="text-[10px] text-slate-400">{ex.category} | {new Date(ex.date).toLocaleDateString('tr-TR')}</span>
                                      </div>
                                      <div className="flex items-center gap-4">
                                          <span className="font-black text-rose-500">-{formatCurrency(ex.amount)}</span>
                                          <button type="button" onClick={() => handleDeleteDocument(ex.id, 'Harcama silindi.')} className="text-slate-400 hover:text-rose-500 transition p-2"><i className="fa-solid fa-trash-can"></i></button>
                                      </div>
                                  </div>
                              ))}
                              {(!budgetStats || budgetStats.currentExpenses.length === 0) && <p className="text-center text-sm font-medium text-slate-400 italic py-4">Bu dönem kayıt yok.</p>}
                          </div>
                      </div>

                      {/* ABONELİKLER */}
                      <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-6 relative`}>
                          <h2 className="text-xl font-black text-slate-900 tracking-tight flex items-center gap-2 mb-4">
                              <i className={`fa-solid fa-repeat ${isAleyna ? 'text-pink-500' : 'text-blue-500'}`}></i> Abonelik Yöneticisi
                          </h2>

                                <option value="film">🎬 Film</option>
                                <option value="dizi">📺 Dizi</option>
                                <option value="oyun">🎮 Oyun</option>
                                <option value="kitap">📚 Kitap</option>
                            </select>
                            <button type="submit" className={`cute-bounce text-white font-bold py-3 px-6 rounded-xl transition flex justify-center items-center shrink-0 bg-${themeColor}-600 hover:bg-${themeColor}-700`}>
                                Raf'a Ekle
                            </button>
                        </form>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-3">Sıradakiler / Okunacaklar</h4>
                                <div className="space-y-2">
                                    {mediaItems.filter(m => m.status === 'bekliyor').map(item => (
                                        <div key={item.id} className="flex justify-between items-center bg-white border border-slate-200 p-3 rounded-xl hover:border-indigo-300 transition">
                                            <div className="flex items-center gap-3">
                                                <button onClick={() => handleUpdateDocField(item.id, 'status', 'bitti', 'Tamamlandı olarak işaretlendi! 🍿')} className="w-6 h-6 rounded-md border-2 border-slate-300 hover:border-indigo-500 hover:bg-indigo-50 transition"></button>
                                                <span className="font-bold text-slate-700">{item.title}</span>
                                                <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded-md text-slate-500 uppercase">{item.mediaType}</span>
                                            </div>
                                            <button type="button" onClick={() => handleDeleteDocument(item.id)} className="text-slate-300 hover:text-rose-500 transition"><i className="fa-solid fa-trash-can"></i></button>
                                        </div>
                                    ))}
                                    {mediaItems.filter(m => m.status === 'bekliyor').length === 0 && <p className="text-xs text-slate-400 italic">Bekleyen kayıt yok.</p>}
                                </div>
                            </div>
                            
                            <div>
                                <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-3">Tamamlananlar ✅</h4>
                                <div className="space-y-2">
                                    {mediaItems.filter(m => m.status === 'bitti').map(item => (
                                        <div key={item.id} className="flex justify-between items-center bg-slate-50 border border-slate-100 p-3 rounded-xl opacity-70">
                                            <div className="flex items-center gap-3">
                                                <i className="fa-solid fa-check text-emerald-500"></i>
                                                <span className="font-bold text-slate-500 line-through-anim">{item.title}</span>
                                            </div>
                                            <button type="button" onClick={() => handleDeleteDocument(item.id)} className="text-slate-300 hover:text-rose-500 transition"><i className="fa-solid fa-trash-can"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            )}

            {/* --- ADD TAB --- */}
            {activeTab === 'add' && (
              <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-6 md:p-8 animate-fade-in relative`}>
                {isAleyna && <span className="absolute top-8 right-8 text-3xl opacity-40 cute-float">🐱</span>}
                <div className="mb-8">
                    <h2 className="text-2xl font-black text-slate-900 tracking-tight">Kayıt Oluştur / Düzenle</h2>
                    <p className="text-slate-500 text-sm mt-1 font-medium">Bu hafta yatırımlarınız nasıl şekillendi? (Sadece değişen veya yeni olanları doldurabilirsiniz)</p>
                </div>

                <form onSubmit={handleSaveEntry} className="space-y-8 relative z-10">
                  
                  <div className="space-y-2">
                    <label className="block text-xs font-black text-slate-400 uppercase tracking-widest pl-1">Değerlendirme Tarihi</label>
                    <input type="date" required value={date} onChange={(e) => setDate(e.target.value)} className={`w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 outline-none transition font-bold text-slate-700 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-indigo-500/10 focus:border-indigo-500'}`} />
                  </div>

                  <div className="space-y-4">
                      
                      <div className={`bg-gradient-to-r ${isAleyna ? 'from-pink-50 to-white border-pink-200' : 'from-emerald-50 to-white border-emerald-200'} border p-5 rounded-[1.5rem]`}>
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className={`fa-solid fa-hand-holding-dollar ${isAleyna ? 'text-pink-500' : 'text-emerald-600'}`}></i> Ekstra Gelirler / Acil Durum Fonu</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <CurrencyInput value={passiveIncome} onChange={setPassiveIncome} placeholder="Bu ayki Temettü / Faiz Getirisi" isAleyna={isAleyna} />
                            <CurrencyInput value={emergencyFund} onChange={setEmergencyFund} placeholder="Acil Durum Fonu (Kenardaki Nakit)" icon="🛡️" isAleyna={isAleyna} />
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-piggy-bank text-emerald-500"></i> Para Piyasası / Mevduat</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <CurrencyInput value={mmfInvested} onChange={setMmfInvested} placeholder="Yatırılan Maliyet" isAleyna={isAleyna} />
                            <CurrencyInput value={mmfCurrent} onChange={setMmfCurrent} placeholder="Güncel Değer" isAleyna={isAleyna} />
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-coins text-amber-400"></i> Altın Fonları / Fiziksel</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <CurrencyInput value={goldInvested} onChange={setGoldInvested} placeholder="Yatırılan Maliyet" isAleyna={isAleyna} />
                            <CurrencyInput value={goldCurrent} onChange={setGoldCurrent} placeholder="Güncel Değer" isAleyna={isAleyna} />
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <h3 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-dollar-sign text-blue-500"></i> Döviz Fonları / Eurobond</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <CurrencyInput value={fxInvested} onChange={setFxInvested} placeholder="Yatırılan (TL)" isAleyna={isAleyna} />
                            <CurrencyInput value={fxCurrent} onChange={setFxCurrent} placeholder="Güncel (TL)" isAleyna={isAleyna} />
                        </div>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-[1.5rem]">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                            <i className="fa-solid fa-arrow-trend-up text-rose-500"></i> Hisse Senetleri
                          </h3>
                          <button type="button" onClick={handleAddStock} className="cute-bounce text-xs bg-rose-100 text-rose-700 px-3 py-2 rounded-xl font-bold transition"><i className="fa-solid fa-plus"></i> Yeni Ekle</button>
                        </div>
                        
                        {stocks.length === 0 && <p className="text-xs font-medium text-slate-400 italic">Şu an takip edilen hisse senedi yok.</p>}

                        <div className="space-y-3">
                          {stocks.map((stock) => (
                            <div key={stock.id} className="flex flex-col sm:flex-row gap-2 bg-white border border-slate-200 p-3 rounded-2xl relative">
                              <button type="button" onClick={() => handleRemoveStock(stock.id)} className="absolute -top-2 -right-2 w-6 h-6 bg-slate-800 text-white rounded-full flex items-center justify-center shadow-md">
                                <i className="fa-solid fa-xmark text-xs"></i>
                              </button>
                              <div className="flex-1">
                                <input type="text" placeholder="Hisse Kodu" value={stock.name} onChange={(e) => handleStockChange(stock.id, 'name', e.target.value)} className={`w-full px-3 py-3 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold text-slate-700 outline-none focus:ring-4 ${isAleyna ? 'focus:ring-pink-500/10 focus:border-pink-500' : 'focus:ring-rose-500/10 focus:border-rose-500'}`} />
                              </div>
                              <div className="flex-1 flex gap-2">
                                  <CurrencyInput value={stock.invested} onChange={(val) => handleStockChange(stock.id, 'invested', val)} placeholder="Yatırılan" isAleyna={isAleyna} />
                                  <CurrencyInput value={stock.current} onChange={(val) => handleStockChange(stock.id, 'current', val)} placeholder="Güncel" isAleyna={isAleyna} />
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                  </div>

                  <button type="submit" disabled={isSaving} className={`w-full cute-bounce text-white font-bold py-5 rounded-2xl shadow-xl transition text-lg flex justify-center items-center gap-2 ${isSaving ? 'bg-slate-400 cursor-not-allowed' : (isAleyna ? 'bg-pink-500 hover:bg-pink-600 shadow-pink-500/30' : 'bg-slate-900 hover:bg-slate-800')}`}>
                    {isSaving ? <i className="fa-solid fa-spinner fa-spin text-xl"></i> : (isAleyna ? <span className="text-xl">🐾</span> : <i className="fa-solid fa-cloud-arrow-up"></i>)}
                    {isSaving ? 'Buluta Eşitleniyor...' : (isAleyna ? 'Kaydet Güzelim 💖' : 'Verileri Güvenli Şekilde Kaydet')}
                  </button>
                </form>
              </div>
            )}

            {/* --- HISTORY TAB --- */}
            {activeTab === 'history' && (
              <div className={`bg-white rounded-[2rem] shadow-sm border ${isAleyna ? 'border-pink-100' : 'border-slate-100'} p-4 md:p-8 animate-fade-in`}>
                
                <div className="flex justify-between items-center mb-6 px-1">
                    <h2 className="text-2xl font-black text-slate-900 flex items-center gap-2">
                        <i className={`fa-solid fa-clock-rotate-left ${isAleyna ? 'text-pink-500' : 'text-indigo-500'}`}></i> Geçmiş Dönemler
                    </h2>
                    
                    <button onClick={handleExportCSV} className={`cute-bounce px-4 py-2 rounded-xl font-bold text-xs md:text-sm flex items-center gap-2 transition ${isAleyna ? 'bg-pink-100 text-pink-700 hover:bg-pink-200' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                        <i className="fa-solid fa-file-excel"></i> <span className="hidden sm:inline">Excel Olarak İndir</span><span className="sm:hidden">İndir</span> {isAleyna && <span>🌸</span>}
                    </button>
                </div>

                <div className="space-y-4 relative z-10">
                  {sortedEntries.map((entry) => {
                    const totalI = (entry.mmfInvested||0) + (entry.goldInvested||0) + (entry.fxInvested||0) + (entry.stocks||[]).reduce((s, x) => s + (x.invested||0), 0) + (entry.emergencyFund||0);
                    const totalC = (entry.mmfCurrent||0) + (entry.goldCurrent||0) + (entry.fxCurrent||0) + (entry.stocks||[]).reduce((s, x) => s + (x.current||0), 0) + (entry.emergencyFund||0);
                    const profit = totalC - totalI;
                    
                    return (
                      <div key={entry.id} className={`bg-slate-50 border border-slate-200 p-4 rounded-3xl flex flex-col sm:flex-row justify-between sm:items-center gap-4 transition hover:border-${isAleyna ? 'pink-300' : 'indigo-300'}`}>
                        <div className="flex items-center gap-4">
                          <div className={`w-14 h-14 bg-white rounded-2xl flex flex-col items-center justify-center shadow-sm border border-slate-100 shrink-0 ${isAleyna ? 'text-pink-600' : 'text-indigo-600'}`}>
                            <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">{new Date(entry.date).toLocaleDateString('tr-TR', {month:'short'})}</span>
                            <span className="text-xl font-black leading-none mt-0.5">{new Date(entry.date).getDate()}</span>
                          </div>
                          <div>
                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-wider mb-1">Toplam Portföy</p>
                            <h4 className="font-black text-lg text-slate-800 leading-none">{formatCurrency(totalC)}</h4>
                          </div>
                        </div>
                        <div className="flex items-center justify-between sm:justify-end gap-3 border-t sm:border-t-0 pt-3 sm:pt-0 border-slate-200">
                          <div className="text-right">
                              <p className="text-[10px] font-bold uppercase text-slate-400 mb-0.5">Net Getiri</p>
                              <p className={`text-sm font-black flex items-center justify-end gap-1 ${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                {profit >= 0 ? '+' : ''}{formatCurrency(profit)}
                              </p>
                          </div>
                          
                          <div className="flex items-center gap-1 ml-2">
                              <button onClick={() => handleEditEntry(entry)} className={`cute-bounce w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-slate-200 shadow-sm transition ${isAleyna ? 'text-pink-500 hover:bg-pink-50' : 'text-indigo-500 hover:bg-indigo-50'}`}>
                                <i className="fa-solid fa-pen-to-square"></i>
                              </button>
                              
                              <button onClick={() => handleDeleteDocument(entry.id, 'Geçmiş kayıt silindi.')} className="cute-bounce w-10 h-10 flex items-center justify-center rounded-xl bg-white text-rose-500 border border-slate-200 shadow-sm hover:bg-rose-50 transition">
                                <i className="fa-solid fa-trash-can"></i>
                              </button>
                          </div>

                        </div>
                      </div>
                    );
                  })}
                  {sortedEntries.length === 0 && (
                      <p className="text-center text-slate-400 font-medium py-10">Henüz kaydedilmiş bir geçmiş bulunmuyor.</p>
                  )}
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
